<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Bazaar Dashboard</title>
</head>
<body>
    <h1>Welcome to Your Shop</h1>
    <div class="card">
        <h3>Vendor Profile</h3>
        <p><strong>Business Name:</strong> <span id="userName">Loading...</span></p>
    </div>
    <button id="logoutBtn">Logout</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // यहाँ आपकी सही Firebase Config है
        const firebaseConfig = {
          apiKey: "AIzaSyAvbSJkEH3NDNy_SIaf0bJk0hkhknTRhno",
          authDomain: "globalbazaar-2c6cb.firebaseapp.com",
          projectId: "globalbazaar-2c6cb",
          storageBucket: "globalbazaar-2c6cb.firebasestorage.app",
          messagingSenderId: "734113870757",
          appId: "1:734113870757:web:653ac103c064685cbaee4c",
          measurementId: "G-NSM7YP4GZG"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const docRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        document.getElementById("userName").innerText = docSnap.data().name || "No Name Found";
                    } else {
                        document.getElementById("userName").innerText = "No Data Found";
                    }
                } catch (error) {
                    console.error("Error loading data:", error);
                    document.getElementById("userName").innerText = "Error loading";
                }
            } else {
                // अगर लॉग-इन नहीं है, तो लॉगिन पेज पर भेजें
                window.location.href = "index.html";
            }
        });

        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => { 
                window.location.href = "index.html"; 
            }).catch((error) => {
                console.error("Logout Error:", error);
            });
        });
    </script>
</body>
</html>
