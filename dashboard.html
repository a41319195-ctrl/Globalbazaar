<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Bazaar Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 10px; width: 300px; }
    </style>
</head>
<body>
    <h1>Welcome to Your Shop</h1>
    <div class="card">
        <h3>Vendor Profile</h3>
        <p><strong>Business Name:</strong> <span id="userName">Loading...</span></p>
    </div>
    <br>
    <label>Select Category:</label>
    <select id="categorySelect">
        <option value="textiles">Textiles</option>
        <option value="electronics">Electronics</option>
        <option value="cosmetics">Cosmetics</option>
    </select>
    <br><br>
    <button id="logoutBtn">Logout</button>
</body>
</html>
<script type="module">
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const auth = getAuth();
    const db = getFirestore();

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // यूजर लॉगिन है, डेटा लाएं
            const docRef = doc(db, "users", user.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                // डेटा मिल गया, नाम अपडेट करें
                document.getElementById("userName").innerText = docSnap.data().name;
            } else {
                document.getElementById("userName").innerText = "User";
            }
        } else {
            // लॉगिन नहीं है, तो वापस भेजें
            window.location.href = "index.html";
        }
    });

    // लॉग आउट बटन का काम
    document.getElementById("logoutBtn").addEventListener("click", () => {
        signOut(auth).then(() => { window.location.href = "index.html"; });
    });
</script>
