<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Bazaar Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 10px; width: 300px; }
    </style>
</head>
<body>
    <h1>Welcome to Your Shop</h1>
    <div class="card">
        <h3>Vendor Profile</h3>
        <p><strong>Business Name:</strong> <span id="userName">Loading...</span></p>
    </div>
    <br>
    <label>Select Category:</label>
    <select id="categorySelect">
        <option value="textiles">Textiles</option>
        <option value="electronics">Electronics</option>
        <option value="cosmetics">Cosmetics</option>
    </select>
    <br><br>
    <button id="logoutBtn">Logout</button>

    <script type="module">
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const auth = getAuth();
        const db = getFirestore();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const docRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(docRef);
                    
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        document.getElementById("userName").innerText = data.name || "No Name Found";
                    } else {
                        document.getElementById("userName").innerText = "Vendor";
                    }
                } catch (error) {
                    console.error("Error:", error);
                    document.getElementById("userName").innerText = "Error";
                }
            } else {
                window.location.href = "index.html";
            }
        });

        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => { window.location.href = "index.html"; });
        });
    </script>
</body>
</html>
