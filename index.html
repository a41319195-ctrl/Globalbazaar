<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GlobalBazaar Official</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        .header { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; text-align: center; }
        .logo { font-size: 26px; font-weight: 900; color: #1e3a8a; display: block; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .section { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .product-card { border: 1px solid #ddd; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 15px; background: #1e3a8a; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <span class="logo">GLOBALBAZAAR 🌍</span>
    <div class="controls">
        <select id="currency" style="width: auto;">
            <option>SAR (Saudi)</option><option>AED (UAE)</option><option>KWD (Kuwait)</option>
            <option>QAR (Qatar)</option><option>OMR (Oman)</option><option>BHD (Bahrain)</option>
            <option>USD ($)</option><option>EUR (€)</option><option>GBP (£)</option>
            <option>INR (₹)</option><option>PKR (Rs)</option>
        </select>
        <div>
            <button onclick="show('buyer')">Buyer</button>
            <button onclick="show('seller')">Seller</button>
        </div>
    </div>
</div>

<div id="buyerSection" class="section">
    <h3>🛒 Buyer Dashboard</h3>
    <input type="text" placeholder="Search products...">
    <div class="product-card">
        <img src="https://via.placeholder.com/100" alt="Product">
        <p>Luxury Smart Watch - SAR 187.50</p>
        <button>Add to Cart</button>
    </div>
    <hr>
    <h4>Checkout</h4>
    <input placeholder="Shipping Address">
    <input placeholder="Postal Code">
    <input placeholder="Phone Number">
    <input placeholder="Card Details">
    <button style="background:green;">Pay & Confirm</button>
    <p>Tracking #: GB-8829</p>
</div>

<div id="sellerSection" class="section" style="display:none;">
    <h3>🏪 Seller Portal</h3>
    <input placeholder="Sign Up / Login Email">
    <input type="password" placeholder="Password">
    <hr>
    <h4>KYC & Verification</h4>
    <input placeholder="National ID / License">
    <input placeholder="Bank Account Number">
    <input type="file" placeholder="Profile Picture">
    <hr>
    <h4>Product Listing</h4>
    <input placeholder="Product Name">
    <select><option>Select Category</option></select>
    <input type="file" placeholder="Product Picture">
    <button style="background:#059669;">List Product</button>
    <hr>
    <p>Wallet: SAR 1,250 | <button style="background:#dc2626;">Withdraw</button></p>
</div>

<script>
    function show(role) {
        document.getElementById('buyerSection').style.display = role === 'buyer' ? 'block' : 'none';
        document.getElementById('sellerSection').style.display = role === 'seller' ? 'block' : 'none';
    }
</script>

</body>
</html>
