        .form-group { margin-bottom: 20px; }

        .phone-group { display: flex; gap: 10px; }
        .phone-group select { width: 35%; }
        .phone-group input { width: 65%; }
        .document-row { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; }
        .cart { background: #ff9800; color: white; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .navbar { background: white; padding: 15px 20px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .menu-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .menu-btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .login-btn { background: #667eea; color: white; }
        .signup-btn { background: #ff9800; color: white; }
        .admin-btn { background: #dc3545; color: white; }
        .profile-btn { background: #28a745; color: white; }
        .hidden { display: none; }
    </style>
</head>

<div class="navbar">

    // Load countries into dropdown
    function loadCountries() {
        const countrySelect = document.getElementById('countrySelect');
        const phoneCodeSelect = document.getElementById('countryCode');
        
        countriesList.sort((a, b) => a.name.localeCompare(b.name));
        
        countriesList.forEach(country => {
            const option = document.createElement('option');
            option.value = country.code;
            option.textContent = `${country.flag || '🌍'} ${country.name}`;
            countrySelect.appendChild(option);
            
            const phoneOption = document.createElement('option');
            phoneOption.value = country.phoneCode;
            phoneOption.textContent = `${country.name} ${country.phoneCode}`;
            phoneCodeSelect.appendChild(phoneOption);
        });
    }

    // Update documents and phone code based on selected country
    function updateDocumentsAndPhoneCode() {
        const countryCode = document.getElementById('countrySelect').value;
        const country = countriesList.find(c => c.code === countryCode);
        
        if (!country) {
            document.getElementById('documentSection').innerHTML = '<div class="document-row">Please select a country</div>';
            return;
        }
        
        // Auto-update phone code
        document.getElementById('countryCode').value = country.phoneCode;
        
        // Generate document fields
        let html = '<label>📄 KYC Documents</label>';
        country.docs.forEach((doc, index) => {
            if (doc.includes('ID') || doc.includes('Card') || doc.includes('License')) {
                html += `
                    <div class="document-row">
                        <strong>${doc}</strong><br>
                        <input type="file" accept="image/*,application/pdf" id="doc_${index}">
                        <small>Upload your ${doc}</small>
                    </div>
                `;
            } else if (doc.includes('SSN') || doc.includes('SIN') || doc.includes('NIN') || doc.includes('CNIC') || doc.includes('TIN')) {
                html += `
                    <div class="document-row">
                        <strong>${doc}</strong><br>
                        <input type="text" placeholder="Enter ${doc} number" id="doc_${index}_text">
                        <input type="file" accept="image/*" id="doc_${index}_file">
                    </div>
                `;
            } else {
                html += `
                    <div class="document-row">
                        <strong>${doc}</strong><br>
                        <input type="file" accept="image/*,application/pdf" id="doc_${index}">
                    </div>
                `;
            }
        });
        
        document.getElementById('documentSection').innerHTML = html;
    }

    function showLogin() { alert("🔐 Login functionality - Enter your credentials"); }
    function showSignup() { alert("📝 Sign Up - Create your account"); }
    function showAdmin() { alert("⚙️ Admin Panel - Manage platform"); }
    function showProfile() { alert("👤 My Profile - View your details"); }
    
    function submitKYC() {
        const country = document.getElementById('countrySelect').value;
        const countryName = countriesList.find(c => c.code === country)?.name;
        const phoneCode = document.getElementById('countryCode').value;
        const phone = document.getElementById('phoneNumber').value;
        
        if (!country || !phone) {
            alert("⚠️ Please select country and enter phone number!");
            return;
        }
        
        alert(`✅ KYC Submitted Successfully!\n\n🌍 Country: ${countryName}\n📞 Phone: ${phoneCode} ${phone}\n\n📄 Documents received. Our team will verify within 24 hours.`);
    }

    // Initialize
    loadCountries();
</script>
