<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalBazaar | Full Platform</title>
    <style>
        :root { --primary: #1e3a8a; --bg: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; }
        header { background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; }
        .card { background: #fff; padding: 20px; border-radius: 12px; margin: 15px; border: 1px solid #e2e8f0; }
        .input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div>☰ Menu | GlobalBazaar 🌍</div>
    <select id="currency">
        <option>SAR (Saudi)</option><option>AED (UAE)</option><option>KWD (Kuwait)</option>
        <option>QAR (Qatar)</option><option>USD ($)</option><option>EUR (€)</option><option>INR (₹)</option>
    </select>
</header>

<div class="card">
    <h3>🛒 Buyer Product View</h3>
    <p>Luxury Smart Watch - SAR 187.50</p>
    <button class="btn" onclick="showCheckout()">Buy Now</button>
</div>

<div id="checkoutFlow" class="card" style="display:none;">
    <h3>🚚 Shipping Details</h3>
    <input class="input" placeholder="Full Delivery Address">
    <input class="input" placeholder="Phone Number">
    <button class="btn" onclick="alert('Order Placed! Tracking ID: GB-998234')">Confirm Order</button>
</div>

<div class="card">
    <h3>🏪 Seller Portal (KYC & Banking)</h3>
    <input class="input" placeholder="Shop Name">
    <input class="input" placeholder="National ID / License (KYC)">
    <input class="input" placeholder="Bank IBAN">
    <button class="btn">Verify Account</button>
</div>

<script>
    function showCheckout() { document.getElementById('checkoutFlow').style.display = 'block'; }
</script>

</body>
</html>
