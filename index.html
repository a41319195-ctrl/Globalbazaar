<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GlobalBazaar - Complete E-commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #f8fafc;
            color: #0f172a;
            padding-bottom: 80px;
        }

        header {
            background: #ffffff;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-icon {
            font-size: 28px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 6px 10px;
            border-radius: 12px;
        }

        .brand-name {
            font-size: 18px;
            font-weight: 700;
            color: #1e3a8a;
        }

        .brand-logo {
            font-size: 24px;
        }

        .header-currency {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 8px 12px;
            border-radius: 28px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .header-icons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            position: relative;
        }

        .wishlist-count, .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }

        .mode-switcher {
            display: flex;
            background: #e2e8f0;
            padding: 6px;
            border-radius: 14px;
            margin-bottom: 20px;
            gap: 6px;
        }

        .mode-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 12px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
        }

        .mode-btn.active {
            background: white;
            color: #2563eb;
        }

        .app-section { display: none; }
        .active-section { display: block; }

        /* Category Pills */
        .category-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            margin-bottom: 16px;
        }

        .category-pill {
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .category-pill.active-cat {
            background: #1e3a8a;
            color: white;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .product-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .product-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
        }

        .product-card h4 {
            font-size: 13px;
            margin: 8px 0 4px;
        }

        .product-price {
            color: #2563eb;
            font-weight: 700;
            font-size: 14px;
        }

        .product-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-buy, .btn-wishlist {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-buy {
            background: #0f172a;
            color: white;
        }

        .btn-wishlist {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-wishlist.active-wish {
            background: #fecaca;
            color: #dc2626;
        }

        /* Product Detail Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            margin: 50px 16px;
            border-radius: 24px;
            padding: 20px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .modal-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 16px;
        }

        .rating-stars {
            color: #fbbf24;
            font-size: 20px;
            margin: 8px 0;
        }

        .review-item {
            background: #f8fafc;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .close-modal {
            float: right;
            font-size: 24px;
            cursor: pointer;
        }

        /* Auth Forms */
        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .auth-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .auth-toggle button {
            flex: 1;
            padding: 10px;
            background: #f1f5f9;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .auth-toggle .active-auth {
            background: #1e3a8a;
            color: white;
        }

        .order-card {
            background: white;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
        }

        .fixed-cart-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px 20px;
            display: flex;
            gap: 8px;
            font-weight: 700;
            cursor: pointer;
            z-index: 99;
        }

        .premium-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .app-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .app-btn {
            background: #1e3a8a;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button class="menu-icon" onclick="toggleSideMenu()">☰</button>
        <span class="brand-name">GlobalBazaar</span>
        <span class="brand-logo">🌍</span>
    </div>
    <div class="header-icons">
        <button class="icon-btn" onclick="showWishlist()">
            ❤️ <span class="wishlist-count" id="wishlistCount">0</span>
        </button>
        <select id="headerCurrencySelect" class="header-currency" onchange="applyCurrencyConversion()">
            <option value="SAR">SAR</option><option value="USD">USD</option><option value="EUR">EUR</option>
            <option value="GBP">GBP</option><option value="INR">INR</option>
        </select>
    </div>
</header>

<div class="container">
    <div class="mode-switcher">
        <button class="mode-btn active" id="buyerModeBtn" onclick="switchMode('buyer')">🛒 Buyer</button>
        <button class="mode-btn" id="sellerModeBtn" onclick="switchMode('seller')">🏪 Seller</button>
        <button class="mode-btn" id="profileModeBtn" onclick="switchMode('profile')">👤 Profile</button>
    </div>

    <!-- BUYER MODE -->
    <div id="buyerSection" class="app-section active-section">
        <!-- Categories -->
        <div class="category-container" id="categoryList"></div>

        <!-- Search -->
        <input type="text" id="searchInput" class="app-input" placeholder="🔍 Search products..." oninput="filterProducts()">

        <!-- Products Grid -->
        <div class="product-grid" id="productsGrid"></div>
    </div>

    <!-- SELLER MODE -->
    <div id="sellerSection" class="app-section">
        <div class="premium-card">
            <h2>➕ Add New Product</h2>
            <input type="text" id="prodName" placeholder="Product Name" class="app-input">
            <input type="number" id="prodPrice" placeholder="Price (USD)" class="app-input">
            <select id="prodCategory" class="app-input">
                <option value="Electronics">Electronics</option><option value="Fashion">Fashion</option>
                <option value="Home">Home</option><option value="Beauty">Beauty</option>
            </select>
            <input type="url" id="prodImage" placeholder="Image URL" class="app-input">
            <textarea id="prodDesc" placeholder="Product Description" class="app-input" rows="3"></textarea>
            <button class="app-btn" onclick="addProduct()">Publish Product</button>
        </div>
        <div class="premium-card">
            <h2>📦 My Products</h2>
            <div id="sellerProductsList"></div>
        </div>
    </div>

    <!-- PROFILE MODE (Login/Signup + Order History) -->
    <div id="profileSection" class="app-section">
        <div id="authContainer">
            <div class="auth-card">
                <div class="auth-toggle">
                    <button id="loginTabBtn" class="active-auth" onclick="showLoginTab()">Login</button>
                    <button id="signupTabBtn" onclick="showSignupTab()">Sign Up</button>
                </div>
                <div id="loginForm">
                    <input type="email" id="loginEmail" placeholder="Email" class="app-input">
                    <input type="password" id="loginPassword" placeholder="Password" class="app-input">
                    <button class="app-btn" onclick="loginUser()">Login</button>
                </div>
                <div id="signupForm" style="display:none;">
                    <input type="text" id="signupName" placeholder="Full Name" class="app-input">
                    <input type="email" id="signupEmail" placeholder="Email" class="app-input">
                    <input type="password" id="signupPassword" placeholder="Password" class="app-input">
                    <button class="app-btn" onclick="signupUser()">Create Account</button>
                </div>
            </div>
        </div>
        <div id="userDashboard" style="display:none;">
            <div class="premium-card">
                <h2>👋 Welcome, <span id="userNameDisplay"></span></h2>
                <button class="app-btn" onclick="logoutUser()" style="background:#ef4444;">Logout</button>
            </div>
            <div class="premium-card">
                <h2>📜 Order History</h2>
                <div id="orderHistoryList"></div>
            </div>
        </div>
    </div>
</div>

<button class="fixed-cart-btn" onclick="showCart()">
    🛒 Cart <span class="cart-count" id="cartCount">0</span>
</button>

<!-- Product Detail Modal -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <img id="modalImg" class="modal-img" src="">
        <h2 id="modalTitle"></h2>
        <p id="modalCategory" style="color:#64748b; font-size:12px;"></p>
        <div class="rating-stars" id="modalStars">★★★★★</div>
        <p id="modalDesc"></p>
        <h3 id="modalPrice"></h3>
        
        <h4>⭐ Reviews & Ratings</h4>
        <div id="reviewsList"></div>
        
        <div style="margin-top:16px;">
            <select id="ratingSelect">
                <option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option>
                <option value="3">⭐⭐⭐</option><option value="2">⭐⭐</option><option value="1">⭐</option>
            </select>
            <input type="text" id="reviewText" placeholder="Write a review..." class="app-input" style="margin-top:8px;">
            <button class="app-btn" onclick="submitReview()">Submit Review</button>
        </div>
        
        <div style="display:flex; gap:10px; margin-top:16px;">
            <button class="app-btn" onclick="addToCartFromModal()">Add to Cart</button>
            <button class="app-btn" onclick="addToWishlistFromModal()" style="background:#64748b;">❤️ Wishlist</button>
        </div>
    </div>
</div>

<script>
    // ---------- DATA ----------
    let products = JSON.parse(localStorage.getItem('products')) || [
        { id:1, name:"Luxury Smart Watch", price:50, category:"Electronics", image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500", description:"Premium smart watch with health tracking", rating:4.5, reviews:[] },
        { id:2, name:"Premium Headphones", price:120, category:"Electronics", image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500", description:"Noise cancellation headphones", rating:4.8, reviews:[] },
        { id:3, name:"Designer T-Shirt", price:35, category:"Fashion", image:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500", description:"Cotton comfortable t-shirt", rating:4.2, reviews:[] },
        { id:4, name:"Leather Jacket", price:180, category:"Fashion", image:"https://images.unsplash.com/photo-1551028719-00167b16eac5?w=500", description:"Genuine leather jacket", rating:4.7, reviews:[] }
    ];
    
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
    let users = JSON.parse(localStorage.getItem('users')) || [];
    let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
    let orders = JSON.parse(localStorage.getItem('orders')) || [];
    
    let currentCategory = "All";
    let currentProduct = null;
    let currencyRates = { SAR:3.75, USD:1, EUR:0.92, GBP:0.78, INR:83.5 };
    let currencySymbols = { SAR:"SAR ", USD:"$", EUR:"€", GBP:"£", INR:"₹" };
    let selectedCurrency = "SAR";
    
    function saveData() {
        localStorage.setItem('products', JSON.stringify(products));
        localStorage.setItem('cart', JSON.stringify(cart));
        localStorage.setItem('wishlist', JSON.stringify(wishlist));
        localStorage.setItem('users', JSON.stringify(users));
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        localStorage.setItem('orders', JSON.stringify(orders));
    }
    
    function applyCurrencyConversion() {
        selectedCurrency = document.getElementById('headerCurrencySelect').value;
        renderProducts();
        updateCartUI();
    }
    
    function convertPrice(usd) {
        let rate = currencyRates[selectedCurrency] || 1;
        return (usd * rate).toFixed(2);
    }
    
    function getSymbol() { return currencySymbols[selectedCurrency] || "$"; }
    
    function renderCategories() {
        let cats = ["All", ...new Set(products.map(p => p.category))];
        document.getElementById('categoryList').innerHTML = cats.map(cat => 
            `<div class="category-pill ${currentCategory===cat?'active-cat':''}" onclick="setCategory('${cat}')">${cat}</div>`
        ).join('');
    }
    
    function setCategory(cat) {
        currentCategory = cat;
        renderCategories();
        renderProducts();
    }
    
    function renderProducts() {
        let searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
        let filtered = products.filter(p => 
            (currentCategory === "All" || p.category === currentCategory) &&
            p.name.toLowerCase().includes(searchTerm)
        );
        document.getElementById('productsGrid').innerHTML = filtered.map(p => `
            <div class="product-card" onclick="openProductDetail(${p.id})">
                <img src="${p.image}" onerror="this.src='https://placehold.co/200x200?text=Product'">
                <h4>${p.name}</h4>
                <div class="product-price">${getSymbol()}${convertPrice(p.price)}</div>
                <div class="product-actions">
                    <button class="btn-buy" onclick="event.stopPropagation(); addToCart(${p.id})">Buy</button>
                    <button class="btn-wishlist ${wishlist.includes(p.id)?'active-wish':''}" onclick="event.stopPropagation(); toggleWishlist(${p.id})">❤️</button>
                </div>
            </div>
        `).join('');
        renderSellerProducts();
        updateWishlistUI();
    }
    
    function filterProducts() { renderProducts(); }
    
    function openProductDetail(id) {
        currentProduct = products.find(p => p.id === id);
        if(!currentProduct) return;
        document.getElementById('modalImg').src = currentProduct.image;
        document.getElementById('modalTitle').innerText = currentProduct.name;
        document.getElementById('modalCategory').innerText = currentProduct.category;
        document.getElementById('modalDesc').innerText = currentProduct.description;
        document.getElementById('modalPrice').innerHTML = `${getSymbol()}${convertPrice(currentProduct.price)}`;
        let stars = "★".repeat(Math.floor(currentProduct.rating)) + "☆".repeat(5-Math.floor(currentProduct.rating));
        document.getElementById('modalStars').innerHTML = stars;
        
        let reviewsHtml = currentProduct.reviews.map(r => `<div class="review-item">⭐${r.rating}/5 - ${r.text}<br><small>${r.user}</small></div>`).join('');
        if(!reviewsHtml) reviewsHtml = "<p>No reviews yet. Be the first!</p>";
        document.getElementById('reviewsList').innerHTML = reviewsHtml;
        document.getElementById('productModal').style.display = 'block';
    }
    
    function submitReview() {
        if(!currentUser) { alert("Please login to review"); return; }
        let rating = parseInt(document.getElementById('ratingSelect').value);
        let text = document.getElementById('reviewText').value;
        if(!text) { alert("Write a review"); return; }
        currentProduct.reviews.push({ user: currentUser.name, rating, text });
        let total = currentProduct.reviews.reduce((a,b)=>a+b.rating,0);
        currentProduct.rating = total / currentProduct.reviews.length;
        saveData();
        openProductDetail(currentProduct.id);
        document.getElementById('reviewText').value = '';
        renderProducts();
    }
    
    function addToCart(id) {
        let product = products.find(p => p.id === id);
        if(!product) return;
        let existing = cart.find(i => i.id === id);
        if(existing) { existing.quantity++; }
        else { cart.push({ id: product.id, name: product.name, price: product.price, quantity: 1 }); }
        saveData();
        updateCartUI();
        alert(`✅ ${product.name} added to cart`);
    }
    
    function addToCartFromModal() { if(currentProduct) addToCart(currentProduct.id); }
    
    function toggleWishlist(id) {
        if(wishlist.includes(id)) { wishlist = wishlist.filter(i => i !== id); }
        else { wishlist.push(id); }
        saveData();
        renderProducts();
        updateWishlistUI();
    }
    
    function addToWishlistFromModal() { if(currentProduct) toggleWishlist(currentProduct.id); }
    
    function updateCartUI() {
        let count = cart.reduce((a,b)=>a+b.quantity,0);
        document.getElementById('cartCount').innerText = count;
    }
    
    function updateWishlistUI() {
        document.getElementById('wishlistCount').innerText = wishlist.length;
    }
    
    function showCart() {
        if(cart.length === 0) { alert("Cart is empty"); return; }
        let totalUSD = cart.reduce((a,i)=> a + (i.price * i.quantity), 0);
        let msg = "🛒 Your Cart:\n";
        cart.forEach(i => { msg += `${i.name} x${i.quantity} = ${getSymbol()}${convertPrice(i.price * i.quantity)}\n`; });
        msg += `\nTotal: ${getSymbol()}${convertPrice(totalUSD)}`;
        if(confirm(msg + "\n\nProceed to Checkout?")) {
            if(!currentUser) { alert("Please login to place order"); switchMode('profile'); return; }
            let order = { id: Date.now(), userId: currentUser.email, items: [...cart], total: totalUSD, date: new Date().toLocaleString() };
            orders.push(order);
            cart = [];
            saveData();
            updateCartUI();
            alert("🎉 Order placed successfully!");
            renderOrderHistory();
        }
    }
    
    function renderOrderHistory() {
        let userOrders = orders.filter(o => o.userId === currentUser?.email);
        if(!userOrders.length) { document.getElementById('orderHistoryList').innerHTML = "<p>No orders yet</p>"; return; }
        document.getElementById('orderHistoryList').innerHTML = userOrders.map(o => `
            <div class="order-card">
                <strong>Order #${o.id}</strong><br>
                Date: ${o.date}<br>
                Total: ${getSymbol()}${convertPrice(o.total)}<br>
                Items: ${o.items.map(i=>`${i.name}(x${i.quantity})`).join(', ')}
            </div>
        `).join('');
    }
    
    function renderSellerProducts() {
        let sellerProds = products;
        document.getElementById('sellerProductsList').innerHTML = sellerProds.map(p => `
            <div class="order-card" style="display:flex; justify-content:space-between;">
                <span>${p.name} - ${getSymbol()}${convertPrice(p.price)}</span>
                <button onclick="deleteProduct(${p.id})" style="background:#ef4444; color:white; border:none; padding:4px 8px; border-radius:6px;">Delete</button>
            </div>
        `).join('');
    }
    
    function addProduct() {
        let name = document.getElementById('prodName').value;
        let price = parseFloat(document.getElementById('prodPrice').value);
        let category = document.getElementById('prodCategory').value;
        let image = document.getElementById('prodImage').value;
        let desc = document.getElementById('prodDesc').value;
        if(!name || !price) { alert("Fill all fields"); return; }
        let newId = Date.now();
        products.push({ id:newId, name, price, category, image: image || "https://placehold.co/200x200", description: desc, rating:0, reviews:[] });
        saveData();
        renderProducts();
        document.getElementById('prodName').value = '';
        document.getElementById('prodPrice').value = '';
        document.getElementById('prodImage').value = '';
        document.getElementById('prodDesc').value = '';
        alert("Product added!");
    }
    
    function deleteProduct(id) {
        products = products.filter(p => p.id !== id);
        saveData();
        renderProducts();
    }
    
    // AUTH
    function showLoginTab() {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('signupForm').style.display = 'none';
        document.getElementById('loginTabBtn').classList.add('active-auth');
        document.getElementById('signupTabBtn').classList.remove('active-auth');
    }
    function showSignupTab() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('signupForm').style.display = 'block';
        document.getElementById('signupTabBtn').classList.add('active-auth');
        document.getElementById('loginTabBtn').classList.remove('active-auth');
    }
    function loginUser() {
        let email = document.getElementById('loginEmail').value;
        let pwd = document.getElementById('loginPassword').value;
        let user = users.find(u => u.email === email && u.password === pwd);
        if(user) {
            currentUser = user;
            saveData();
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('userDashboard').style.display = 'block';
            document.getElementById('userNameDisplay').innerText = user.name;
            renderOrderHistory();
            alert("Login successful!");
        } else { alert("Invalid credentials"); }
    }
    function signupUser() {
        let name = document.getElementById('signupName').value;
        let email = document.getElementById('signupEmail').value;
        let pwd = document.getElementById('signupPassword').value;
        if(users.find(u => u.email === email)) { alert("Email exists"); return; }
        let newUser = { name, email, password: pwd };
        users.push(newUser);
        currentUser = newUser;
        saveData();
        document.getElementById('authContainer').style.display = 'none';
        document.getElementById('userDashboard').style.display = 'block';
        document.getElementById('userNameDisplay').innerText = name;
        alert("Signup successful!");
    }
    function logoutUser() {
        currentUser = null;
        saveData();
        document.getElementById('authContainer').style.display = 'block';
        document.getElementById('userDashboard').style.display = 'none';
        switchMode('buyer');
    }
    
    function switchMode(mode) {
        document.querySelectorAll('.app-section').forEach(sec => sec.classList.remove('active-section'));
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        if(mode === 'buyer') {
            document.getElementById('buyerSection').classList.add('active-section');
            document.getElementById('buyerModeBtn').classList.add('active');
        } else if(mode === 'seller') {
            document.getElementById('sellerSection').classList.add('active-section');
            document.getElementById('sellerModeBtn').classList.add('active');
        } else {
            document.getElementById('profileSection').classList.add('active-section');
            document.getElementById('profileModeBtn').classList.add('active');
            if(currentUser) {
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('userDashboard').style.display = 'block';
                document.getElementById('userNameDisplay').innerText = currentUser.name;
                renderOrderHistory();
            } else {
                document.getElementById('authContainer').style.display = 'block';
                document.getElementById('userDashboard').style.display = 'none';
            }
        }
    }
    
    function showWishlist() {
        if(wishlist.length === 0) { alert("Wishlist is empty"); return; }
        let wishProducts = products.filter(p => wishlist.includes(p.id));
        let msg = "❤️ Wishlist:\n";
        wishProducts.forEach(p => { msg += `${p.name} - ${getSymbol()}${convertPrice(p.price)}\n`; });
        alert(msg);
    }
    
    function closeModal() { document.getElementById('productModal').style.display = 'none'; }
    function toggleSideMenu() { alert("📱 Menu\n- Buyer\n- Seller\n- Profile\n- Wishlist\n- Orders"); }
    
    // Initialize
    window.onload = () => {
        renderCategories();
        renderProducts();
        updateCartUI();
        updateWishlistUI();
        if(currentUser) {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('userDashboard').style.display = 'block';
            document.getElementById('userNameDisplay').innerText = currentUser.name;
        }
    };
</script>
</body>
</html>
