<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalBazaar - Ultra Premium Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* [यहाँ आपका पूरा 600 लाइन वाला ओरिजिनल CSS है] */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        /* ... (आपका पूरा पुराना CSS यहाँ पेस्ट करें) ... */

        /* नया मेनू का CSS जो मैंने जोड़ा है */
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: #fff; overflow-x: hidden; transition: 0.5s; padding-top: 60px; box-shadow: 2px 0 5px rgba(0,0,0,0.2); }
        .sidenav a { padding: 15px; text-decoration: none; font-size: 18px; color: #1e3a8a; display: block; }
        .menu-btn { font-size: 24px; cursor: pointer; color: #1e3a8a; margin-right: 15px; }
    </style>
</head>
<body>

    <div id="mySidenav" class="sidenav">
        <a href="javascript:void(0)" onclick="document.getElementById('mySidenav').style.width = '0'">× Close</a>
        <div style="padding: 20px;">
            <button class="mode-btn" onclick="switchDashboardMode('buyer'); document.getElementById('mySidenav').style.width = '0'">🛒 Buyer Panel</button>
            <button class="mode-btn" onclick="switchDashboardMode('seller'); document.getElementById('mySidenav').style.width = '0'">🏪 Seller Panel</button>
        </div>
    </div>

    <header>
        <div style="display:flex; align-items:center;">
            <span class="menu-btn" onclick="document.getElementById('mySidenav').style.width = '250px'">☰</span>
            <h1>GlobalBazaar 🌍</h1>
        </div>
        </header>

    <div class="container">
        </div>

    <script>
        // आपका पूरा ओरिजिनल 600 लाइन वाला JS यहाँ पेस्ट करें

        // सिर्फ यह नया फंक्शन जोड़ें, बाकी अपना पुराना रहने दें
        function handleKycVerification(e) {
            e.preventDefault();
            // फोटो का लॉजिक
            const file = document.getElementById('kycAvatarInput').files[0];
            const reader = new FileReader();
            reader.onload = function(e) { document.getElementById('displaySellerAvatar').src = e.target.result; }
            if(file) reader.readAsDataURL(file);
            
            // आपका ओरिजिनल Firebase सेविंग लॉजिक यहाँ जारी रखें
            // ... (आपका पुराना पूरा KYC कोड) ...
        }
    </script>
</body>
</html>
