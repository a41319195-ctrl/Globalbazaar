<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GlobalBazaar - Multi-Seller Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #f5f7fb;
            overflow-x: hidden;
            padding-bottom: 95px;
            font-size: 18px;
            line-height: 1.5;
        }

        /* HEADER */
        .header {
            background: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #e9eef3;
        }
        .menu-icon {
            background: #f0f3f9;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 30px;
            font-size: 28px;
            cursor: pointer;
        }
        .brand {
            font-weight: 800;
            font-size: 24px;
            background: linear-gradient(135deg, #1e2b6e, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .currency-select {
            background: #f0f3f9;
            border: none;
            padding: 12px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
        }
        .icon-btn {
            background: #f0f3f9;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 30px;
            font-size: 24px;
            position: relative;
            cursor: pointer;
        }
        .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: white;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 30px;
        }

        /* DRAWER */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(3px);
            z-index: 200;
            display: none;
        }
        .drawer {
            position: fixed;
            top: 0;
            left: -85%;
            width: 80%;
            max-width: 330px;
            height: 100%;
            background: white;
            z-index: 201;
            transition: left 0.3s ease;
            border-radius: 0 28px 28px 0;
            padding: 20px 0;
            overflow-y: auto;
        }
        .drawer.open { left: 0; }
        .drawer-header { padding: 24px 20px; border-bottom: 1px solid #eef2f8; }
        .drawer-header h2 { font-size: 28px; }
        .drawer-header p { font-size: 16px; }
        .drawer-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            font-weight: 600;
            font-size: 19px;
            cursor: pointer;
            margin: 6px 12px;
            border-radius: 18px;
        }
        .drawer-item:active { background: #f0f3f9; }

        /* MAIN */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }
        .mode-tabs {
            display: flex;
            background: white;
            padding: 8px;
            border-radius: 60px;
            margin-bottom: 24px;
            gap: 10px;
        }
        .mode-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 16px;
            font-weight: 700;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
        }
        .mode-btn.active {
            background: #1e2b6e;
            color: white;
        }
        .section { display: none; }
        .section.active { display: block; }

        /* CATEGORIES */
        .cat-scroll {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding: 10px 0 18px;
        }
        .cat-pill {
            background: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 17px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            white-space: nowrap;
        }
        .cat-pill.active { background: #1e2b6e; color: white; }

        /* PRODUCT GRID */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-top: 12px;
        }
        .product-card {
            background: white;
            border-radius: 28px;
            padding: 16px;
            cursor: pointer;
            border: 1px solid #eef2f8;
        }
        .product-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 20px; }
        .seller-name-tag { font-size: 13px; color: #2563eb; margin: 12px 0 8px; font-weight: 700; }
        .product-card h4 { font-size: 18px; margin-bottom: 6px; }
        .prod-price { font-weight: 800; font-size: 20px; color: #1e2b6e; margin-top: 8px; }
        .card-actions { display: flex; gap: 12px; margin-top: 16px; }
        .btn-sm { flex: 1; padding: 12px; border-radius: 60px; font-weight: 700; font-size: 15px; border: none; cursor: pointer; }
        .btn-buy { background: #0f172a; color: white; }
        .btn-wish { background: #f1f5f9; font-size: 18px; }
        .btn-wish.active { background: #fee2e2; color: #dc2626; }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 300;
            overflow-y: auto;
        }
        .modal-card {
            background: white;
            margin: 50px 20px;
            border-radius: 36px;
            padding: 28px;
        }
        .close-modal { float: right; font-size: 34px; cursor: pointer; }

        /* FORMS */
        .input {
            width: 100%;
            padding: 18px;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            margin-bottom: 18px;
            font-size: 17px;
        }
        .btn-primary {
            background: #1e2b6e;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 18px;
            width: 100%;
            cursor: pointer;
        }
        .fixed-cart {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e2b6e;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 18px 28px;
            display: flex;
            gap: 14px;
            font-weight: 800;
            font-size: 20px;
            z-index: 99;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .order-card { background: #f8fafc; border-radius: 22px; padding: 18px; margin-bottom: 16px; font-size: 16px; }
        h3 { font-size: 24px; margin-bottom: 16px; }
        h4 { font-size: 19px; margin: 16px 0 12px; }
        .address-box {
            background: #f0f9ff;
            border-radius: 20px;
            padding: 16px;
            margin: 12px 0;
            border-left: 4px solid #2563eb;
        }
        .illegal-warning {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 16px;
            font-size: 14px;
            margin-top: 8px;
            text-align: center;
        }
        .seller-dashboard-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #eef2f8;
        }
        .seller-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #2563eb;
        }
    </style>
</head>
<body>

<div class="header">
    <button class="menu-icon" id="menuBtn">☰</button>
    <div class="brand">GlobalBazaar 🌍</div>
    <div class="header-right">
        <button class="icon-btn" id="wishlistHeaderBtn">❤️ <span class="badge" id="wishCountHead">0</span></button>
        <select id="currencySelect" class="currency-select">
            <option value="SAR">🇸🇦 SAR</option>
            <option value="AED">🇦🇪 AED</option>
            <option value="KWD">🇰🇼 KWD</option>
            <option value="QAR">🇶🇦 QAR</option>
            <option value="OMR">🇴🇲 OMR</option>
            <option value="BHD">🇧🇭 BHD</option>
            <option value="USD">🇺🇸 USD</option>
            <option value="EUR">🇪🇺 EUR</option>
            <option value="GBP">🇬🇧 GBP</option>
            <option value="INR">🇮🇳 INR</option>
            <option value="PKR">🇵🇰 PKR</option>
            <option value="CNY">🇨🇳 CNY</option>
        </select>
    </div>
</div>

<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
    <div class="drawer-header"><h2>GlobalBazaar</h2><p>Multi‑Seller Hub</p></div>
    <div class="drawer-item" data-mode="buyer">🛒 Buyer Shopping</div>
    <div class="drawer-item" data-mode="seller">🏪 Seller Dashboard</div>
    <div class="drawer-item" data-mode="profile">👤 My Profile</div>
    <div class="drawer-item" id="drawerWishlist">❤️ My Wishlist</div>
    <div class="drawer-item" id="drawerSupport">📞 Support</div>
    <div class="drawer-item" id="drawerLogout">🚪 Logout</div>
</div>

<div class="container">
    <div class="mode-tabs">
        <button class="mode-btn active" data-tab="buyer">🛒 Buyer</button>
        <button class="mode-btn" data-tab="seller">🏪 Seller</button>
        <button class="mode-btn" data-tab="profile">👤 Profile</button>
    </div>

    <div id="buyerSection" class="section active">
        <div class="cat-scroll" id="catList"></div>
        <input type="text" id="searchInput" class="input" placeholder="🔍 Search products..." oninput="renderProducts()">
        <div class="product-grid" id="productsGrid"></div>
    </div>

    <div id="sellerSection" class="section">
        <div id="sellerRegisterBox" class="seller-dashboard-card" style="margin:0;">
            <h2 style="margin-bottom:20px;">🏪 Open Your Shop</h2>
            <form id="sellerRegForm">
                <h4>📸 Profile Picture</h4>
                <input type="file" id="sellerAvatar" accept="image/*" class="input" required>
                <input type="text" id="sellerFullName" placeholder="Full Legal Name" class="input" required>
                <input type="text" id="sellerShopName" placeholder="Shop / Brand Name" class="input" required>
                <input type="email" id="sellerEmail" placeholder="Email" class="input" required>
                <input type="tel" id="sellerPhone" placeholder="📞 Phone Number" class="input" required>
                <input type="password" id="sellerPassword" placeholder="Password" class="input" required>
                <h4>📍 Shop Address</h4>
                <input type="text" id="sellerStreet" placeholder="Street / Area" class="input" required>
                <input type="text" id="sellerCity" placeholder="City" class="input" required>
                <input type="text" id="sellerState" placeholder="State" class="input" required>
                <input type="text" id="sellerCountryReg" placeholder="Country" class="input" required>
                <h4>🆔 KYC</h4>
                <select id="sellerIdType" class="input"><option>National ID</option><option>Passport</option></select>
                <input type="text" id="sellerIdNumber" placeholder="ID Number" class="input" required>
                <input type="file" id="sellerIdImage" accept="image/*" class="input" required>
                <h4>🏦 Bank Account</h4>
                <input type="text" id="sellerBank" placeholder="Bank Name" class="input" required>
                <input type="text" id="sellerIban" placeholder="IBAN" class="input" required>
                <input type="text" id="sellerSwift" placeholder="Swift Code" class="input" required>
                <button type="submit" class="btn-primary">✅ Register Shop</button>
            </form>
        </div>
        <div id="sellerDashboard" style="display:none;"></div>
    </div>

    <div id="profileSection" class="section">
        <div id="profileAuthBox" class="seller-dashboard-card" style="margin:0;">
            <div style="display:flex; gap:12px; margin-bottom:20px;">
                <button id="showLoginBtn" class="btn-primary" style="background:#e2e8f0; color:#000;">Login</button>
                <button id="showSignupBtn" class="btn-primary" style="background:#e2e8f0; color:#000;">Sign Up</button>
            </div>
            <div id="loginFormDiv">
                <input type="email" id="loginEmail" placeholder="Email" class="input">
                <input type="password" id="loginPass" placeholder="Password" class="input">
                <button class="btn-primary" id="doLoginBtn">Login</button>
            </div>
            <div id="signupFormDiv" style="display:none;">
                <input type="text" id="signupName" placeholder="Full Name" class="input">
                <input type="email" id="signupEmail" placeholder="Email" class="input">
                <input type="password" id="signupPass" placeholder="Password" class="input">
                <button class="btn-primary" id="doSignupBtn">Create Account</button>
            </div>
        </div>
        <div id="buyerProfilePanel" style="display:none;">
            <div class="seller-dashboard-card">
                <h2>👋 Welcome, <span id="profileName"></span></h2>
                <button class="btn-primary" id="logoutBuyerBtn" style="background:#dc2626;">Logout</button>
            </div>
            <div class="seller-dashboard-card">
                <h3>📜 Order History</h3>
                <div id="buyerOrdersList"></div>
            </div>
        </div>
    </div>
</div>

<button class="fixed-cart" id="cartFloatBtn">🛒 Cart <span class="badge" id="cartCountBadge">0</span></button>

<div id="productModal" class="modal">
    <div class="modal-card">
        <span class="close-modal" id="closeModalBtn">&times;</span>
        <img id="modalImg" style="width:100%; border-radius:24px; margin:10px 0;">
        <h2 id="modalTitle" style="font-size:26px;"></h2>
        <p id="modalSellerName" style="color:#2563eb; font-size:17px;"></p>
        <p id="modalDesc" style="font-size:16px; margin:12px 0;"></p>
        <h3 id="modalPrice" style="font-size:24px;"></h3>
        <div id="modalStars" style="font-size:22px;"></div>
        <div id="modalReviews"></div>
        <select id="ratingSelect" class="input"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="3">⭐⭐⭐</option><option value="2">⭐⭐</option><option value="1">⭐</option></select>
        <input type="text" id="reviewText" placeholder="Write a review" class="input">
        <button class="btn-primary" id="submitReviewBtn">Submit Review</button>
        <div style="display:flex; gap:10px; margin-top:16px;">
            <button class="btn-primary" id="modalAddCartBtn">Add to Cart</button>
            <button class="btn-primary" id="modalAddWishBtn" style="background:#475569;">❤️ Wishlist</button>
        </div>
    </div>
</div>

<script>
    // ILLEGAL KEYWORDS
    const illegalKeywords = [
        "gun","pistol","rifle","weapon","bomb","explosive","grenade","ammunition","bullet","knife","sword",
        "cocaine","heroin","weed","marijuana","cannabis","drugs","narcotics","lsd","mdma","meth",
        "human trafficking","slave","forced labour","child labour","sex trafficking",
        "ivory","tiger skin","elephant tusk","rhino horn",
        "fake","replica","counterfeit","duplicate","forged",
        "porn","adult toy","nude","sexual","xxx"
    ];

    function isIllegal(name, desc) {
        let text = (name + " " + desc).toLowerCase();
        for(let kw of illegalKeywords) if(text.includes(kw)) return true;
        return false;
    }

    // CURRENCY
    let fx = { "SAR":3.75, "AED":3.67, "KWD":0.31, "QAR":3.64, "OMR":0.38, "BHD":0.38, "USD":1, "EUR":0.92, "GBP":0.78, "INR":83.5, "PKR":278, "CNY":7.25 };
    let sym = { "SAR":"SAR ", "AED":"AED ", "KWD":"KWD ", "QAR":"QAR ", "OMR":"OMR ", "BHD":"BHD ", "USD":"$", "EUR":"€", "GBP":"£", "INR":"₹", "PKR":"₨", "CNY":"¥" };
    let selectedCurr = "SAR";

    let sellers = JSON.parse(localStorage.getItem('gb_sellers')) || [];
    let products = JSON.parse(localStorage.getItem('gb_products')) || [
        {id:1, sellerId:0, sellerName:"GlobalBazaar", name:"Luxury Smart Watch", price:50, category:"Electronics", image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400", description:"Premium smart watch", rating:4.5, reviews:[]},
        {id:2, sellerId:0, sellerName:"GlobalBazaar", name:"Premium Headphones", price:120, category:"Electronics", image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400", description:"Noise cancellation", rating:4.8, reviews:[]}
    ];
    let buyers = JSON.parse(localStorage.getItem('gb_buyers')) || [];
    let currentBuyer = JSON.parse(localStorage.getItem('gb_current_buyer')) || null;
    let currentSeller = JSON.parse(localStorage.getItem('gb_current_seller')) || null;
    let cart = JSON.parse(localStorage.getItem('gb_cart')) || [];
    let wishlist = JSON.parse(localStorage.getItem('gb_wishlist')) || [];
    let orders = JSON.parse(localStorage.getItem('gb_orders')) || [];

    function saveAll() {
        localStorage.setItem('gb_sellers', JSON.stringify(sellers));
        localStorage.setItem('gb_products', JSON.stringify(products));
        localStorage.setItem('gb_buyers', JSON.stringify(buyers));
        localStorage.setItem('gb_current_buyer', JSON.stringify(currentBuyer));
        localStorage.setItem('gb_current_seller', JSON.stringify(currentSeller));
        localStorage.setItem('gb_cart', JSON.stringify(cart));
        localStorage.setItem('gb_wishlist', JSON.stringify(wishlist));
        localStorage.setItem('gb_orders', JSON.stringify(orders));
    }

    function convert(usd) { return (usd * fx[selectedCurr]).toFixed(2); }
    function getSym() { return sym[selectedCurr]; }

    document.getElementById('currencySelect').addEventListener('change', (e) => { selectedCurr = e.target.value; renderProducts(); updateCartUI(); if(currentSeller) renderSellerDashboard(); });

    let currentCategory = "All";
    function renderCats() {
        let cats = ["All", ...new Set(products.map(p=>p.category))];
        document.getElementById('catList').innerHTML = cats.map(c => `<div class="cat-pill ${currentCategory===c?'active':''}" data-cat="${c}">${c}</div>`).join('');
        document.querySelectorAll('.cat-pill').forEach(el => el.addEventListener('click', (e) => { currentCategory = e.target.dataset.cat; renderCats(); renderProducts(); }));
    }

    function renderProducts() {
        let search = document.getElementById('searchInput')?.value.toLowerCase() || "";
        let filtered = products.filter(p => (currentCategory==="All" || p.category===currentCategory) && p.name.toLowerCase().includes(search));
        let html = filtered.map(p => {
            let seller = sellers.find(s=>s.id===p.sellerId) || {shopName:p.sellerName || "GlobalBazaar"};
            return `<div class="product-card" data-id="${p.id}">
                <img src="${p.image}" onerror="this.src='https://placehold.co/200x200'">
                <div class="seller-name-tag">🏪 ${seller.shopName}</div>
                <h4>${p.name}</h4>
                <div class="prod-price">${getSym()}${convert(p.price)}</div>
                <div class="card-actions">
                    <button class="btn-sm btn-buy addCartBtn" data-id="${p.id}">Buy</button>
                    <button class="btn-sm btn-wish wishBtn ${wishlist.includes(p.id)?'active':''}" data-id="${p.id}">❤️</button>
                </div>
            </div>`;
        }).join('');
        document.getElementById('productsGrid').innerHTML = html;
        document.querySelectorAll('.addCartBtn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); addToCart(parseInt(btn.dataset.id)); }));
        document.querySelectorAll('.wishBtn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); toggleWish(parseInt(btn.dataset.id)); }));
        document.querySelectorAll('.product-card').forEach(card => card.addEventListener('click', () => openProduct(parseInt(card.dataset.id))));
        updateWishUI();
    }

    function openProduct(id) {
        let p = products.find(x=>x.id===id);
        if(!p) return;
        currentProduct = p;
        let seller = sellers.find(s=>s.id===p.sellerId) || {shopName:p.sellerName};
        document.getElementById('modalImg').src = p.image;
        document.getElementById('modalTitle').innerText = p.name;
        document.getElementById('modalSellerName').innerHTML = `🏪 ${seller.shopName}`;
        document.getElementById('modalDesc').innerText = p.description;
        document.getElementById('modalPrice').innerHTML = `${getSym()}${convert(p.price)}`;
        let stars = "★".repeat(Math.floor(p.rating)) + "☆".repeat(5-Math.floor(p.rating));
        document.getElementById('modalStars').innerHTML = stars;
        document.getElementById('modalReviews').innerHTML = p.reviews.map(r=>`<div class="order-card">⭐${r.rating} - ${r.text}<br><small>${r.user}</small></div>`).join('') || "<i>No reviews</i>";
        document.getElementById('productModal').style.display = 'block';
    }
    let currentProduct = null;

    function addToCart(id) {
        let p = products.find(x=>x.id===id);
        if(!p) return;
        let existing = cart.find(i=>i.id===id);
        if(existing) existing.qty++;
        else cart.push({id:p.id, name:p.name, price:p.price, sellerId:p.sellerId, sellerName:p.sellerName, qty:1});
        saveAll();
        updateCartUI();
        alert("✅ Added to cart");
    }

    function updateCartUI() { document.getElementById('cartCountBadge').innerText = cart.reduce((a,b)=>a+b.qty,0); }
    function toggleWish(id) { if(wishlist.includes(id)) wishlist = wishlist.filter(i=>i!==id); else wishlist.push(id); saveAll(); renderProducts(); updateWishUI(); }
    function updateWishUI() { document.getElementById('wishCountHead').innerText = wishlist.length; }

    // ADDRESS COLLECTION
    function collectAddress() {
        let addr = {
            name: prompt("📝 Full Name (Required):", ""),
            street: prompt("📝 Street / Area / Village (Required):", ""),
            house: prompt("🏠 House/Building No. (Optional):", "") || "N/A",
            landmark: prompt("📍 Landmark (Optional):", "") || "N/A",
            city: prompt("🏙️ City / Town (Required):", ""),
            state: prompt("🗺️ State / Province (Required):", ""),
            country: prompt("🌍 Country (Required):", "India")
        };
        if(!addr.name || !addr.street || !addr.city || !addr.state || !addr.country) {
            alert("❌ Name, Street, City, State, Country are required!");
            return null;
        }
        return `${addr.name}, ${addr.street}, ${addr.house}, ${addr.landmark}, ${addr.city}, ${addr.state}, ${addr.country}`;
    }

    // CHECKOUT
    document.getElementById('cartFloatBtn')?.addEventListener('click', () => {
        if(cart.length===0) return alert("Cart is empty!");
        if(!currentBuyer) { alert("Please login as buyer first! Go to Profile tab."); return; }
        
        let address = collectAddress();
        if(!address) return;
        
        let tracking = "GB" + Date.now() + Math.floor(Math.random()*10000);
        cart.forEach(item => {
            orders.push({
                id: Date.now()+Math.random(), trackingNumber: tracking,
                sellerId: item.sellerId, sellerName: item.sellerName,
                buyerEmail: currentBuyer.email, buyerName: currentBuyer.name,
                productName: item.name, amount: item.price*item.qty,
                address: address, date: new Date().toLocaleString(), status: "confirmed"
            });
            let seller = sellers.find(s=>s.id===item.sellerId);
            if(seller) seller.earnings = (seller.earnings||0) + (item.price*item.qty);
        });
        cart = []; saveAll(); updateCartUI();
        alert(`✅ ORDER CONFIRMED!\nTracking ID: ${tracking}\nWe'll update you.`);
        if(currentBuyer) renderBuyerOrders();
    });

    // SELLER REGISTRATION
    document.getElementById('sellerRegForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        let avatar = document.getElementById('sellerAvatar').files[0];
        let idImg = document.getElementById('sellerIdImage').files[0];
        if(!avatar || !idImg) { alert("Upload photo & ID"); return; }
        let reader = new FileReader();
        reader.onload = (ev) => {
            let avatarUrl = ev.target.result;
            let reader2 = new FileReader();
            reader2.onload = (ev2) => {
                let newSeller = {
                    id: Date.now(), avatar: avatarUrl,
                    fullName: document.getElementById('sellerFullName').value,
                    shopName: document.getElementById('sellerShopName').value,
                    email: document.getElementById('sellerEmail').value,
                    phone: document.getElementById('sellerPhone').value,
                    password: document.getElementById('sellerPassword').value,
                    street: document.getElementById('sellerStreet').value,
                    city: document.getElementById('sellerCity').value,
                    state: document.getElementById('sellerState').value,
                    country: document.getElementById('sellerCountryReg').value,
                    idType: document.getElementById('sellerIdType').value,
                    idNumber: document.getElementById('sellerIdNumber').value,
                    idDoc: ev2.target.result,
                    bankName: document.getElementById('sellerBank').value,
                    iban: document.getElementById('sellerIban').value,
                    swift: document.getElementById('sellerSwift').value,
                    earnings: 0
                };
                sellers.push(newSeller);
                currentSeller = newSeller;
                saveAll();
                document.getElementById('sellerRegisterBox').style.display = 'none';
                document.getElementById('sellerDashboard').style.display = 'block';
                renderSellerDashboard();
                alert("✅ Shop Registered!");
            };
            reader2.readAsDataURL(idImg);
        };
        reader.readAsDataURL(avatar);
    });

    function renderSellerDashboard() {
        if(!currentSeller) return;
        let myProds = products.filter(p=>p.sellerId===currentSeller.id);
        let myOrders = orders.filter(o=>o.sellerId===currentSeller.id);
        let earnings = myOrders.reduce((a,b)=>a+b.amount,0);
        currentSeller.earnings = earnings;
        saveAll();
        document.getElementById('sellerDashboard').innerHTML = `
            <div class="seller-dashboard-card">
                <div class="flex-between">
                    <div><img src="${currentSeller.avatar}" class="seller-avatar"><h2 style="margin-top:10px;">${currentSeller.shopName}</h2><p>${currentSeller.fullName}</p><p>📞 ${currentSeller.phone}</p></div>
                    <span style="background:#dcfce7;padding:8px 16px;border-radius:40px;">✅ KYC</span>
                </div>
                <div class="flex-between" style="margin:16px 0;"><span>🏦 ${currentSeller.bankName}</span><span>💰 ${getSym()}${convert(earnings)}</span></div>
                <button id="withdrawBtn" class="btn-primary" style="background:#10b981;">💸 Withdraw Weekly</button>
            </div>
            <div class="seller-dashboard-card">
                <h3>➕ Add Product</h3>
                <div id="illegalWarn" class="illegal-warning" style="display:none;">🚫 Illegal product detected!</div>
                <input id="prodName" class="input" placeholder="Product Name">
                <input id="prodPrice" class="input" type="number" placeholder="Price (USD)">
                <select id="prodCat" class="input"><option>Electronics</option><option>Fashion</option><option>Home</option></select>
                <input id="prodImg" class="input" placeholder="Image URL">
                <textarea id="prodDesc" class="input" rows="3" placeholder="Description"></textarea>
                <button id="publishBtn" class="btn-primary">Publish</button>
            </div>
            <div class="seller-dashboard-card"><h3>📋 My Products</h3><div id="myProductsList"></div></div>
            <div class="seller-dashboard-card"><h3>📦 Orders Received</h3><div id="sellerOrdersList"></div></div>
        `;
        
        document.getElementById('publishBtn')?.addEventListener('click', () => {
            let name = document.getElementById('prodName').value;
            let desc = document.getElementById('prodDesc').value;
            if(isIllegal(name, desc)) {
                document.getElementById('illegalWarn').style.display = 'block';
                alert("🚫 BLOCKED! Illegal product not allowed.");
                return;
            }
            document.getElementById('illegalWarn').style.display = 'none';
            let price = parseFloat(document.getElementById('prodPrice').value);
            let cat = document.getElementById('prodCat').value;
            let img = document.getElementById('prodImg').value;
            if(!name || !price) { alert("Fill name & price"); return; }
            let newP = { id: Date.now(), sellerId: currentSeller.id, sellerName: currentSeller.shopName, name, price, category: cat, image: img || "https://placehold.co/200x200", description: desc, rating: 0, reviews: [] };
            products.push(newP);
            saveAll();
            renderSellerDashboard();
            renderProducts();
            alert("Product published!");
            document.getElementById('prodName').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodImg').value = '';
            document.getElementById('prodDesc').value = '';
        });
        
        document.getElementById('myProductsList').innerHTML = myProds.map(p => `<div class="flex-between"><span>${p.name} - ${getSym()}${convert(p.price)}</span><button class="delProd" data-id="${p.id}" style="background:#dc2626;border:none;padding:6px 14px;border-radius:30px;color:white;">Delete</button></div>`).join('');
        document.querySelectorAll('.delProd').forEach(btn => btn.addEventListener('click', () => { products = products.filter(p=>p.id!==parseInt(btn.dataset.id)); saveAll(); renderSellerDashboard(); renderProducts(); }));
        
        document.getElementById('sellerOrdersList').innerHTML = myOrders.map(o => `<div class="order-card"><strong>Order #${o.trackingNumber}</strong><br>Buyer: ${o.buyerName}<br>Product: ${o.productName}<br>Amount: ${getSym()}${convert(o.amount)}<br>Address: ${o.address}<br><button class="shipBtn" data-id="${o.id}" style="background:#2563eb;border:none;padding:8px 16px;border-radius:30px;color:white;">📦 Mark Shipped</button></div>`).join('');
        document.querySelectorAll('.shipBtn').forEach(btn => btn.addEventListener('click', () => { let track = prompt("Enter Tracking Number:"); if(track) { let ord = orders.find(o=>o.id==parseInt(btn.dataset.id)); ord.trackingNumber = track; saveAll(); alert("Tracking added!"); renderSellerDashboard(); } }));
        
        document.getElementById('withdrawBtn')?.addEventListener('click', () => { if(currentSeller.earnings>0) { alert(`Withdrawal ${getSym()}${convert(currentSeller.earnings)} requested to ${currentSeller.bankName}`); currentSeller.earnings=0; saveAll(); renderSellerDashboard(); } else alert("No balance"); });
    }

    // BUYER AUTH
    document.getElementById('showLoginBtn')?.addEventListener('click', () => { document.getElementById('loginFormDiv').style.display='block'; document.getElementById('signupFormDiv').style.display='none'; });
    document.getElementById('showSignupBtn')?.addEventListener('click', () => { document.getElementById('loginFormDiv').style.display='none'; document.getElementById('signupFormDiv').style.display='block'; });
    document.getElementById('doLoginBtn')?.addEventListener('click', () => {
        let em = document.getElementById('loginEmail').value;
        let pw = document.getElementById('loginPass').value;
        let buyer = buyers.find(b=>b.email===em && b.password===pw);
        if(buyer) { currentBuyer = buyer; saveAll(); document.getElementById('profileAuthBox').style.display='none'; document.getElementById('buyerProfilePanel').style.display='block'; document.getElementById('profileName').innerText = buyer.name; renderBuyerOrders(); alert("Login successful!"); }
        else alert("Invalid credentials");
    });
    document.getElementById('doSignupBtn')?.addEventListener('click', () => {
        let name = document.getElementById('signupName').value;
        let em = document.getElementById('signupEmail').value;
        let pw = document.getElementById('signupPass').value;
        if(buyers.find(b=>b.email===em)) { alert("Email exists"); return; }
        let newBuyer = { name, email: em, password: pw };
        buyers.push(newBuyer);
        currentBuyer = newBuyer;
        saveAll();
        document.getElementById('profileAuthBox').style.display='none';
        document.getElementById('buyerProfilePanel').style.display='block';
        document.getElementById('profileName').innerText = name;
        renderBuyerOrders();
        alert("Signup successful!");
    });
    document.getElementById('logoutBuyerBtn')?.addEventListener('click', () => { currentBuyer = null; saveAll(); document.getElementById('profileAuthBox').style.display='block'; document.getElementById('buyerProfilePanel').style.display='none'; });

    function renderBuyerOrders() {
        let myOrders = orders.filter(o=>o.buyerEmail===currentBuyer?.email);
        document.getElementById('buyerOrdersList').innerHTML = myOrders.map(o => `<div class="order-card"><strong>🔖 Tracking: ${o.trackingNumber}</strong><br>${o.productName} - ${getSym()}${convert(o.amount)}<br>📍 ${o.address}<br>Status: ${o.status}</div>`).join('') || "<p>No orders yet</p>";
    }

    // DRAWER & TABS
    function openDrawer() { document.getElementById('drawer').classList.add('open'); document.getElementById('drawerOverlay').style.display = 'block'; }
    function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').style.display = 'none'; }
    document.getElementById('menuBtn').onclick = openDrawer;
    document.getElementById('drawerOverlay').onclick = closeDrawer;
    document.querySelectorAll('.mode-btn').forEach(btn => btn.addEventListener('click', (e) => {
        let tab = btn.dataset.tab;
        document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
        document.getElementById(tab+"Section").classList.add('active');
        if(tab==='seller' && currentSeller) { document.getElementById('sellerRegisterBox').style.display='none'; document.getElementById('sellerDashboard').style.display='block'; renderSellerDashboard(); }
        if(tab==='profile' && currentBuyer) { document.getElementById('profileAuthBox').style.display='none'; document.getElementById('buyerProfilePanel').style.display='block'; renderBuyerOrders(); }
        closeDrawer();
    }));
    document.querySelectorAll('.drawer-item[data-mode]').forEach(el => el.addEventListener('click', () => { document.querySelector(`.mode-btn[data-tab="${el.dataset.mode}"]`).click(); closeDrawer(); }));
    document.getElementById('drawerWishlist')?.addEventListener('click', () => { let wp = products.filter(p=>wishlist.includes(p.id)); alert("❤️ Wishlist:\n"+wp.map(p=>p.name).join("\n")); closeDrawer(); });
    document.getElementById('drawerLogout')?.addEventListener('click', () => { currentBuyer=null; currentSeller=null; saveAll(); location.reload(); });
    document.getElementById('closeModalBtn')?.addEventListener('click', () => document.getElementById('productModal').style.display='none');
    document.getElementById('modalAddCartBtn')?.addEventListener('click', () => { if(currentProduct) addToCart(currentProduct.id); document.getElementById('productModal').style.display='none'; });
    document.getElementById('modalAddWishBtn')?.addEventListener('click', () => { if(currentProduct) toggleWish(currentProduct.id); document.getElementById('productModal').style.display='none'; });
    document.getElementById('submitReviewBtn')?.addEventListener('click', () => { if(!currentBuyer) return alert("Login to review"); let rate = parseInt(document.getElementById('ratingSelect').value); let txt = document.getElementById('reviewText').value; if(!txt) return; currentProduct.reviews.push({user: currentBuyer.name, rating: rate, text: txt}); let avg = currentProduct.reviews.reduce((a,b)=>a+b.rating,0)/currentProduct.reviews.length; currentProduct.rating = avg; saveAll(); openProduct(currentProduct.id); document.getElementById('reviewText').value=''; renderProducts(); });

    renderCats(); renderProducts(); updateCartUI(); updateWishUI();
    if(currentSeller) { document.getElementById('sellerRegisterBox').style.display='none'; document.getElementById('sellerDashboard').style.display='block'; renderSellerDashboard(); }
    if(currentBuyer) { document.getElementById('profileAuthBox').style.display='none'; document.getElementById('buyerProfilePanel').style.display='block'; document.getElementById('profileName').innerText = currentBuyer.name; renderBuyerOrders(); }
</script>
</body>
</html>
