<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalBazaar - Multi-Currency Premium Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f8fafc;
            color: #0f172a;
            padding-bottom: 90px;
        }

        header {
            background: #ffffff;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1e3a8a;
        }

        .live-node-badge {
            background: #dcfce7;
            color: #15803d;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 16px;
        }

        .app-screen { display: none; }
        .active-screen { display: block; animation: fadeIn 0.3s ease-in-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .premium-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }

        .premium-card h2 {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 16px;
        }

        .app-input {
            width: 100%;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
            color: #334155;
            margin-bottom: 14px;
        }

        .app-btn {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ffffff;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.03);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: #64748b;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            gap: 4px;
            flex: 1;
        }

        .nav-item.active-nav { color: #2563eb; font-weight: 700; }
        .nav-icon { font-size: 20px; }

        .invoice-line {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 10px 0;
            border-bottom: 1px dashed #e2e8f0;
        }
        .invoice-total {
            font-weight: 700;
            color: #10b981;
            font-size: 16px;
            border-bottom: none;
            padding-top: 14px;
        }

        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .catalog-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; text-align: center; }
        .catalog-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
        .catalog-card h4 { font-size: 13px; font-weight: 600; color: #1e293b; }
        .catalog-card .price { color: #2563eb; font-weight: 700; font-size: 14px; margin: 4px 0; }
        .route-badge { font-size: 10px; background: #f1f5f9; padding: 2px 6px; border-radius: 4px; color: #64748b; }
    </style>
</head>
<body>

    <header>
        <h1>GlobalBazaar 🌍</h1>
        <div class="live-node-badge">FX Converter Active</div>
    </header>

    <div class="container">

        <!-- SCREEN 1: MARKET VIEW -->
        <div id="screenMarket" class="app-screen active-screen">
            <div class="premium-card" style="background: linear-gradient(180deg, #eff6ff, #ffffff); border: none;">
                <p style="font-size: 12px; color: #3b82f6; font-weight: 700; text-transform: uppercase;">Worldwide Feed</p>
                <h3 style="font-size: 18px; font-weight: 700; margin-top: 2px;">Cross-Border Direct Hub</h3>
            </div>

            <div class="market-grid" id="globalContainerCatalog">
                <div class="catalog-card">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" alt="Product">
                    <h4>Luxury Smart Watch</h4>
                    <div class="price">$50.00 USD</div>
                    <span class="route-badge">Origin: India Node</span>
                    <button class="app-btn" style="padding: 6px; font-size: 12px; margin-top: 8px; background: #0f172a;" onclick="initializeRoutingOrder('Luxury Smart Watch', 50.00, 'India')">Route Order</button>
                </div>
            </div>
        </div>

        <!-- SCREEN 2: DYNAMIC INT'L SHIPPING & MULTI-CURRENCY CALCULATOR -->
        <div id="screenRouting" class="app-screen">
            <div class="premium-card">
                <h2>✈️ Dynamic Border-Crossing Layer</h2>
                <label style="font-size: 12px; font-weight: 600; color:#475569;">Merchant Cargo Origin:</label>
                <select id="originCountry" class="app-input" onchange="runDynamicRoutingMatrix()">
                    <option value="India">India (Mumbai Terminal)</option>
                    <option value="Saudi Arabia">Saudi Arabia (Riyadh Air Hub)</option>
                    <option value="China">China (Shenzhen Port)</option>
                </select>

                <label style="font-size: 12px; font-weight: 600; color:#475569;">Consumer Delivery Destination:</label>
                <select id="destCountry" class="app-input" onchange="runDynamicRoutingMatrix()">
                    <option value="United States">United States (USD $)</option>
                    <option value="Saudi Arabia">Saudi Arabia (SAR ریال)</option>
                    <option value="India">India (INR ₹)</option>
                </select>
            </div>

            <!-- Global Multi-Currency Invoice Box -->
            <div class="premium-card" style="border-left: 4px solid #2563eb;">
                <h2>📋 Localized Local Currency Invoice</h2>
                <div id="invoiceBreakdownContainer">
                    <!-- Dynamic currency converted layers render here -->
                </div>
                <div style="margin-top: 15px;">
                    <input type="text" class="app-input" placeholder="💳 Enter International Card Number" style="margin-bottom: 8px;">
                    <button class="app-btn" onclick="executeEscrowPayment()">Authorize Secure Clearance</button>
                </div>
            </div>
        </div>

        <!-- SCREEN 3: SELLER CONTROL MANAGEMENT -->
        <div id="screenSeller" class="app-screen">
            <div class="premium-card" style="background: linear-gradient(135deg, #1e293b, #0f172a); color: white;">
                <p style="font-size: 12px; opacity: 0.8;">Total Global Ledger Balance</p>
                <h1 style="font-size: 32px; font-weight: 700; margin: 5px 0; color: #34d399;">$540.00 USD</h1>
                <button style="background:#3b82f6; color:white; border:none; padding:8px 12px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer;" onclick="alert('🏦 Routing clearance corridor to linked bank account...')">Withdraw Funds to Local Bank</button>
            </div>

            <div class="premium-card">
                <h2>📦 List Global Product Cargo</h2>
                <form id="merchantInventoryForm">
                    <input type="text" id="mProdName" class="app-input" placeholder="Cargo Product Name" required>
                    <input type="number" id="mProdPrice" class="app-input" placeholder="Base Item Value ($ USD)" required>
                    <select id="mProdOrigin" class="app-input">
                        <option value="India">Cargo Origin: India</option>
                        <option value="Saudi Arabia">Cargo Origin: Saudi Arabia</option>
                        <option value="China">Cargo Origin: China</option>
                    </select>
                    <input type="url" id="mProdImg" class="app-input" placeholder="Secure Image Asset URL" required>
                    <button type="submit" class="app-btn">Publish to Worldwide Distribution</button>
                </form>
            </div>
        </div>

    </div>

    <!-- Bottom App Navigation Bar -->
    <div class="bottom-nav">
        <button class="nav-item active-nav" id="btnNavMarket" onclick="navigateApp('screenMarket', 'btnNavMarket')">
            <span class="nav-icon">🛒</span>
            <span>Market View</span>
        </button>
        <button class="nav-item" id="btnNavRoute" onclick="navigateApp('screenRouting', 'btnNavRoute')">
            <span class="nav-icon">✈️</span>
            <span>Global Layer</span>
        </button>
        <button class="nav-item" id="btnNavSeller" onclick="navigateApp('screenSeller', 'btnNavSeller')">
            <span class="nav-icon">🏪</span>
            <span>Seller Panel</span>
        </button>
    </div>

    <script>
        let activeCalculationItem = "Luxury Smart Watch";
        let activeCalculationBasePrice = 50.00;

        function navigateApp(screenId, btnId) {
            document.querySelectorAll('.app-screen').forEach(screen => screen.classList.remove('active-screen'));
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active-nav'));
            document.getElementById(screenId).classList.add('active-screen');
            document.getElementById(btnId).classList.add('active-nav');

            if(screenId === 'screenRouting') { runDynamicRoutingMatrix(); }
        }

        function initializeRoutingOrder(name, price, impliedOrigin) {
            activeCalculationItem = name;
            activeCalculationBasePrice = parseFloat(price);
            document.getElementById('originCountry').value = impliedOrigin;
            navigateApp('screenRouting', 'btnNavRoute');
        }

        // DYNAMIC CONVERSION MATRIX (USD, INR, SAR)
        function runDynamicRoutingMatrix() {
            const origin = document.getElementById('originCountry').value;
            const destination = document.getElementById('destCountry').value;

            let freightUSD = 12.50; 
            let customsUSD = 3.80; 

            if (origin === "India" && destination === "United States") {
                freightUSD = 28.50;
                customsUSD = 8.20;
            } else if (origin === destination) {
                freightUSD = 4.00;
                customsUSD = 0.00;
            }

            const gatewayUSD = parseFloat((activeCalculationBasePrice * 0.029 + 0.30).toFixed(2));
            const platformUSD = parseFloat((activeCalculationBasePrice * 0.05).toFixed(2));
            
            // Absolute Base USD Summation
            const totalUSD = activeCalculationBasePrice + freightUSD + customsUSD + gatewayUSD + platformUSD;

            // CURRENCY LOGIC SWITCHES
            let rate = 1.0;
            let symbol = "$";
            let currencyCode = "USD";

            if (destination === "India") {
                rate = 83.50; // $1 USD = 83.50 INR
                symbol = "₹";
                currencyCode = "INR";
            } else if (destination === "Saudi Arabia") {
                rate = 3.75; // $1 USD = 3.75 SAR
                symbol = "SAR ";
                currencyCode = "SAR";
            }

            // Converter Helper Function
            const fx = (val) => (val * rate).toFixed(2);

            const targetContainer = document.getElementById('invoiceBreakdownContainer');
            targetContainer.innerHTML = `
                <div class="invoice-line"><span>Target Cargo Asset:</span><strong>${activeCalculationItem}</strong></div>
                <div class="invoice-line"><span>Base Value:</span><span>${symbol}${fx(activeCalculationBasePrice)} (${currencyCode})</span></div>
                <div class="invoice-line"><span>Global Logistics Freight:</span><span>${symbol}${fx(freightUSD)}</span></div>
                <div class="invoice-line"><span>Customs Surcharge:</span><span>${symbol}${fx(customsUSD)}</span></div>
                <div class="invoice-line"><span>Gateway Fee:</span><span>${symbol}${fx(gatewayUSD)}</span></div>
                <div class="invoice-line"><span>Platform Margin:</span><span>${symbol}${fx(platformUSD)}</span></div>
                <div class="invoice-line invoice-total"><span>Total Payable Amount:</span><span>${symbol}${fx(totalUSD)} ${currencyCode}</span></div>
            `;
        }

        function executeEscrowPayment() {
            alert("🎉 Secure payment clearings authorized successfully in local converted currency! Funds held inside GlobalBazaar Escrow Ledger.");
            navigateApp('screenMarket', 'btnNavMarket');
        }

        document.getElementById('merchantInventoryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('mProdName').value;
            const price = parseFloat(document.getElementById('mProdPrice').value);
            const origin = document.getElementById('mProdOrigin').value;
            const img = document.getElementById('mProdImg').value;

            const catalogBox = document.getElementById('globalContainerCatalog');
            catalogBox.insertAdjacentHTML('beforeend', `
                <div class="catalog-card">
                    <img src="${img}" alt="${name}">
                    <h4 style="text-transform: capitalize;">${name}</h4>
                    <div class="price">$${price.toFixed(2)} USD</div>
                    <span class="route-badge">Origin: ${origin} Node</span>
                    <button class="app-btn" style="padding: 6px; font-size: 12px; margin-top: 8px; background: #0f172a;" onclick="initializeRoutingOrder('${name}', ${price}, '${origin}')">Route Order</button>
                </div>
            `);
            alert("🚀 Cargo Added! Syncing with system core routing nodes.");
            document.getElementById('merchantInventoryForm').reset();
            navigateApp('screenMarket', 'btnNavMarket');
        });
    </script>
</body>
</html>
