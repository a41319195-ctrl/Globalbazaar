<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalBazaar - Premium Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans', sans-serif; }
        body { background:#f8fafc; color:#0f172a; padding-bottom:40px; }
        
        /* Header & Menu */
        header { background:#fff; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #e2e8f0; position:sticky; top:0; z-index:900; }
        .menu-btn { font-size:24px; cursor:pointer; }
        
        #sideMenu { position:fixed; left:-280px; top:0; width:280px; height:100%; background:#fff; z-index:1000; padding:20px; transition:0.3s; box-shadow:2px 0 10px rgba(0,0,0,0.1); }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); display:none; z-index:950; }
        
        .container { max-width:600px; margin:0 auto; padding:16px; }
        .app-section { display:none; }
        .active-section { display:block; }
        
        .premium-card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:20px; margin-bottom:20px; }
        .app-input { width:100%; background:#f8fafc; border:1px solid #cbd5e1; padding:12px; border-radius:10px; margin-bottom:14px; }
        .app-btn { background:#2563eb; color:white; border:none; width:100%; padding:14px; border-radius:12px; font-weight:600; cursor:pointer; }
        .market-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .catalog-card { background:white; border:1px solid #e2e8f0; border-radius:12px; padding:12px; }
        .catalog-card img { width:100%; height:110px; object-fit:cover; border-radius:8px; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:15px;">
            <span class="menu-btn" onclick="toggleMenu()">☰</span>
            <h1>GlobalBazaar</h1>
        </div>
        <div onclick="scrollToCheckout()">🛒 <span id="globalCartCount">0</span></div>
    </header>

    <div id="sideMenu">
        <h3>Menu</h3><br>
        <select id="userCurrencyNode" class="app-input" onchange="applyGlobalCurrencyConversion()">
            <option value="SAR">SAR - Saudi Riyal</option>
            <option value="USD">USD - Dollar</option>
            <option value="INR">INR - Rupee</option>
        </select>
        <button class="app-btn" onclick="switchMode('buyer')">🛒 Buyer Panel</button><br><br>
        <button class="app-btn" onclick="switchMode('seller')">🏪 Seller Panel</button>
    </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="container">
        <div id="panelBuyerSpace" class="app-section active-section">
            <input type="text" class="app-input" placeholder="🔍 Search products...">
            <div class="market-grid" id="globalContainerCatalog">
                </div>
        </div>

        <div id="panelSellerSpace" class="app-section">
            <div id="kycVerificationGate" class="premium-card">
                <h2>Merchant KYC</h2>
                <input type="file" id="kycAvatarInput" class="app-input" accept="image/*">
                <input type="text" id="kycFullName" class="app-input" placeholder="Full Name">
                <input type="text" id="kycShopName" class="app-input" placeholder="Shop Name">
                <button class="app-btn" onclick="handleKyc()">Verify & Start</button>
            </div>
            
            <div id="sellerDashboardContent" style="display:none;">
                <div class="premium-card">
                    <img id="displaySellerAvatar" style="width:60px; height:60px; border-radius:50%; object-fit:cover;">
                    <h3 id="displayShopName"></h3>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            const overlay = document.getElementById('overlay');
            const isOpen = menu.style.left === '0px';
            menu.style.left = isOpen ? '-280px' : '0px';
            overlay.style.display = isOpen ? 'none' : 'block';
        }

        function switchMode(mode) {
            toggleMenu();
            document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active-section'));
            if(mode === 'buyer') document.getElementById('panelBuyerSpace').classList.add('active-section');
            else document.getElementById('panelSellerSpace').classList.add('active-section');
        }

        function handleKyc() {
            const file = document.getElementById('kycAvatarInput').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('displaySellerAvatar').src = e.target.result;
                document.getElementById('displayShopName').innerText = document.getElementById('kycShopName').value;
                document.getElementById('kycVerificationGate').style.display = 'none';
                document.getElementById('sellerDashboardContent').style.display = 'block';
            };
            if(file) reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
