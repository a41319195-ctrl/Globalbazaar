<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalBazaar | Master Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e3a8a; --bg: #f8fafc; --success: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); padding-bottom: 50px; }
        
        /* Fixed Header */
        header { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; border: none; background: none; color: var(--primary); padding: 5px; }
        .logo { font-weight: 800; color: var(--primary); font-size: 20px; }
        
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .app-input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 15px; }
        
        /* Buttons */
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 13px; }
        .btn-buy { background-color: var(--success); }
        
        .hidden { display: none; }
        
        /* Product Display */
        .product-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .product-card { text-align: center; }
        .product-card img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; border: 1px solid #f1f5f9; }
        .product-title { font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 5px; }
        .product-price { font-size: 16px; font-weight: 600; color: var(--accent); margin-bottom: 15px; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>
            <div class="logo">GlobalBazaar 🌍</div>
        </div>
        <select id="currencySelect" class="app-input" style="width: auto; margin: 0;">
            <option>SAR</option><option>USD</option><option>INR</option>
        </select>
    </header>

    <div id="sideMenu" class="card hidden" style="position:fixed; top:70px; left:20px; z-index:110; width: 220px; transition: 0.3s;">
        <p style="padding:10px 0;">👤 My Profile</p><hr style="margin:5px 0; border:0; border-top:1px solid #e2e8f0;">
        <p style="padding:10px 0;">⚙️ Settings</p><hr style="margin:5px 0; border:0; border-top:1px solid #e2e8f0;">
        <p style="padding:10px 0; color:#ef4444; font-weight:600; cursor:pointer;" onclick="alert('Logged out!')">🚪 Logout</p>
    </div>

    <div class="container">
        <div style="display: flex; gap: 10px; margin-bottom: 25px;">
            <button class="btn" style="flex:1;" onclick="showTab('buyer')">🛒 Buyer</button>
            <button class="btn" style="flex:1; background:#475569;" onclick="showTab('seller')">🏪 Seller Login</button>
        </div>

        <div id="buyerSection" class="product-grid">
            <div class="card product-card">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=600&auto=format&fit=crop" alt="Smart Watch">
                <div class="product-title">Luxury Smart Watch</div>
                <div class="product-price">Price: SAR 187.50</div>
                <button class="btn btn-buy" onclick="openPayment()">Buy Now</button>
            </div>
        </div>

        <div id="sellerSection" class="card hidden">
            <h2 style="margin-bottom:15px;">🏪 Seller Login</h2>
            <input type="email" class="app-input" placeholder="Email Address">
            <input type="password" class="app-input" placeholder="Password">
            <button class="btn">Sign In</button>
        </div>
    </div>

    <div id="paymentModal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); padding:20px; z-index:200;">
        <div class="card" style="margin-top: 50px;">
            <h2 style="margin-bottom:15px;">💳 Secure Payment</h2>
            <input type="text" class="app-input" placeholder="Card Holder Name">
            <input type="text" class="app-input" placeholder="Card Number" maxlength="16">
            <div style="display:flex; gap:10px;">
                <input type="text" class="app-input" placeholder="MM/YY" maxlength="5">
                <input type="text" class="app-input" placeholder="CVV" maxlength="3">
            </div>
            <button class="btn" style="margin-top:10px;" onclick="alert('Payment Successful!'); closePayment()">Pay Now</button>
            <button class="btn" style="background:#ef4444; margin-top:10px;" onclick="closePayment()">Cancel</button>
        </div>
    </div>

    <script>
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('hidden'); }
        function showTab(id) {
            document.getElementById('buyerSection').style.display = id === 'buyer' ? 'grid' : 'none';
            document.getElementById('sellerSection').style.display = id === 'seller' ? 'block' : 'none';
            document.getElementById('sideMenu').classList.add('hidden'); // close menu when switching tabs
        }
        function openPayment() { document.getElementById('paymentModal').style.display='block'; }
        function closePayment() { document.getElementById('paymentModal').style.display='none'; }
    </script>

</body>
</html>
