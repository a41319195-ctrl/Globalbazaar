<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalBazaar | Official</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: #f8fafc; }
        .header { display: flex; justify-content: space-between; padding: 15px; background: white; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .search-container { padding: 10px; }
        .search-bar { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; }
        
        /* Sidebar Menu */
        .sidebar { position: fixed; right: -280px; top: 0; width: 250px; height: 100%; background: white; padding: 20px; transition: 0.3s; box-shadow: -2px 0 10px rgba(0,0,0,0.1); z-index: 1000; }
        .sidebar.active { right: 0; }
        
        .main-content { padding: 15px; }
        .product-card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn { background: #1e3a8a; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; width: 100%; }
        .hidden { display: none; }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <h3>GlobalBazaar</h3>
    <button onclick="document.getElementById('side-menu').classList.add('active')">☰ Menu</button>
</div>

<!-- Search Bar Top -->
<div class="search-container">
    <input type="text" class="search-bar" placeholder="Search products...">
</div>

<!-- Hamburger Menu -->
<div id="side-menu" class="sidebar">
    <button onclick="document.getElementById('side-menu').classList.remove('active')">Close</button>
    <h3>Settings</h3>
    <label>Currency:</label>
    <select id="currency" onchange="updateView()">
        <option value="SAR">SAR (Riyadh)</option>
        <option value="USD">USD</option>
    </select>
    <hr>
    <button onclick="showSection('buyer-section')">Buyer Shopping</button>
    <button onclick="showSection('seller-section')">Seller Dashboard</button>
</div>

<!-- Main Section -->
<div class="main-content">
    <div id="buyer-section">
        <h3>Marketplace</h3>
        <div class="product-card">
            <h4>Luxury Watch</h4>
            <p id="price-display">SAR 187.50</p>
            <button class="btn">Buy Now</button>
        </div>
    </div>

    <!-- Seller Dashboard -->
    <div id="seller-section" class="hidden">
        <h3>Seller Profile</h3>
        <input type="text" placeholder="Product Name" style="width:100%; padding:8px; margin-bottom:10px;">
        <input type="text" placeholder="Category" style="width:100%; padding:8px; margin-bottom:10px;">
        <button class="btn">Publish Product</button>
    </div>
</div>

<script>
    function showSection(id) {
        document.getElementById('buyer-section').classList.add('hidden');
        document.getElementById('seller-section').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('side-menu').classList.remove('active');
    }
    
    function updateView() {
        const cur = document.getElementById('currency').value;
        document.getElementById('price-display').innerText = cur + " 187.50";
    }
</script>

</body>
</html>
