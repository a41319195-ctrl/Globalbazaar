<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalBazaar Marketplace</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        .header { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; color: #1e3a8a; font-size: 20px; }
        .btn-group { display: flex; gap: 5px; }
        button { padding: 8px 12px; background: #1e3a8a; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .section { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header">
    <div class="top-row">
        <div class="logo">☰ GLOBALBAZAAR 🌍</div>
        <div class="btn-group">
            <button onclick="show('buyerSection')">Buyer</button>
            <button onclick="show('sellerSection')">Seller</button>
        </div>
    </div>
    <select>
        <option>SAR (Saudi)</option><option>USD</option><option>INR</option>
    </select>
</div>

<div id="buyerSection" class="section">
    <h3>🛒 Buyer Portal</h3>
    <input type="text" placeholder="Search products...">
    <select><option>All Categories</option></select>
    
    <div id="products">
        <p>1. Watch - SAR 187 | <button onclick="openCheckout()">Add to Cart</button></p>
        <p>2. Phone - SAR 900 | <button onclick="openCheckout()">Add to Cart</button></p>
        </div>

    <div id="checkoutArea" style="display:none; border-top:2px solid #eee; margin-top:10px;">
        <input placeholder="Shipping Address">
        <input placeholder="Phone Number">
        <input placeholder="Card Details (Payment)">
        <button style="background:green;">Pay & Confirm</button>
        <p>Tracking ID: GB-9988</p>
    </div>
</div>

<div id="sellerSection" class="section" style="display:none;">
    <h3>🏪 Seller Portal</h3>
    <input placeholder="Email / Login">
    <input placeholder="KYC: National ID / License">
    <input placeholder="Bank IBAN">
    <input type="file" placeholder="Profile Pic">
    <hr>
    <h4>List Product</h4>
    <input placeholder="Product Name">
    <select><option>Select Category</option></select>
    <input type="file" placeholder="Product Pic">
    <button style="background: #059669;">List Product</button>
    <hr>
    <p>Wallet Balance: <b>SAR 1,250.00</b></p>
    <button style="background: #dc2626;">Withdraw Funds</button>
</div>

<script>
    function show(id) {
        document.getElementById('buyerSection').style.display = (id === 'buyerSection') ? 'block' : 'none';
        document.getElementById('sellerSection').style.display = (id === 'sellerSection') ? 'block' : 'none';
    }
    function openCheckout() { document.getElementById('checkoutArea').style.display = 'block'; }
</script>

</body>
</html>
