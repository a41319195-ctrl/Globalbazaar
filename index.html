<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        .header { background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .nav-btns { display: flex; gap: 5px; }
        button { padding: 8px 12px; background: #1e3a8a; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .section { background: white; padding: 15px; border-radius: 8px; margin-top: 10px; }
        .product-card { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .img-box { width: 60px; height: 60px; background: #ccc; margin-right: 10px; }
        input, select { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="header">
    <div class="top-row">
        <strong>GLOBALBAZAAR 🌍</strong>
        <div class="nav-btns">
            <button onclick="show('home')">Home</button>
            <button onclick="show('seller')">Seller</button>
        </div>
    </div>
    <select>
        <option>SAR (Saudi)</option><option>AED (UAE)</option><option>KWD (Kuwait)</option>
        <option>QAR (Qatar)</option><option>OMR (Oman)</option><option>BHD (Bahrain)</option>
        <option>USD ($)</option><option>EUR (€)</option><option>GBP (£)</option>
        <option>INR (₹)</option><option>PKR (Rs)</option>
    </select>
</div>

<div id="homeSection" class="section">
    <input type="text" placeholder="Search products...">
    <select><option>Select Category</option></select>
    
    <div id="product-list">
               <div class="product-card" style="display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ddd;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="img-box"></div>
                <div><div>Watch</div><div style="font-weight:bold; color: #1e3a8a;">SAR 187</div></div>
            </div>
            <button onclick="openCheckout()" style="padding: 5px 10px;">Add to Cart</button>
        </div>
 oduct-card"><div class="img-box"></div> <span>Shoes - SAR 150</span> <button onclick="openCheckout()">Add to Cart</button></div>
        <div class="product-card"><div class="img-box"></div> <span>Bag - SAR 130</span> <button onclick="openCheckout()">Add to Cart</button></div>
    </div>

        <div id="checkoutSection" style="display:none; margin-top:20px; border-top:2px solid #333; padding: 15px; background: #fff;">
        <h4>💳 Secure Payment Details</h4>
        <input placeholder="Shipping Address">
        <input placeholder="Phone Number">
        <input placeholder="Cardholder Name">
        <input placeholder="Card Number (0000 0000 0000 0000)" maxlength="16">
        <div style="display: flex; gap: 5px;">
            <input placeholder="MM/YY" style="flex:1;">
            <input placeholder="CVV" type="password" maxlength="3" style="flex:1;">
        </div>
        <button style="background:green; margin-top:10px; width:100%;" onclick="alert('Order Successful! Tracking ID: GB-9988')">Pay & Confirm</button>
    </div>


<div id="sellerSection" class="section" style="display:none;">
    <h3>🏪 Seller Portal</h3>
    <input placeholder="Email/Login">
    <input type="password" placeholder="Password">
    <input placeholder="KYC: ID/License">
    <input placeholder="Bank IBAN">
    <input type="file">
    <input placeholder="Product Name">
    <select><option>Select Category</option></select>
    <button style="background: #059669;">List Product</button>
    <p>Wallet: SAR 1,250</p>
    <button style="background: #dc2626;">Withdraw Funds</button>
</div>

<script>
    function show(page) {
        document.getElementById('homeSection').style.display = page === 'home' ? 'block' : 'none';
        document.getElementById('sellerSection').style.display = page === 'seller' ? 'block' : 'none';
    }
    function openCheckout() { document.getElementById('checkoutSection').style.display = 'block'; }
</script>

</body>
</html>
