<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalBazaar - Premium Matrix</title>
    <style>
        /* ... [अपना पूरा CSS यहाँ रहने दें] ... */
        
        /* नया साइड मेनू स्टाइल */
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: #fff; overflow-x: hidden; transition: 0.5s; padding-top: 60px; box-shadow: 2px 0 5px rgba(0,0,0,0.2); }
        .sidenav a { padding: 15px; text-decoration: none; font-size: 18px; color: #1e3a8a; display: block; }
        .menu-btn { font-size: 24px; cursor: pointer; color: #1e3a8a; margin-right: 15px; }
    </style>
</head>
<body>

    <div id="mySidenav" class="sidenav">
        <a href="javascript:void(0)" onclick="document.getElementById('mySidenav').style.width = '0'">× Close</a>
        <div style="padding: 20px;">
            <button class="app-btn" onclick="switchDashboardMode('buyer'); document.getElementById('mySidenav').style.width = '0'">🛒 Buyer Panel</button>
            <br><br>
            <button class="app-btn" onclick="switchDashboardMode('seller'); document.getElementById('mySidenav').style.width = '0'">🏪 Seller Panel</button>
        </div>
    </div>

    <header>
        <div style="display:flex; align-items:center;">
            <span class="menu-btn" onclick="document.getElementById('mySidenav').style.width = '250px'">☰</span>
            <h1>GlobalBazaar</h1>
        </div>
        </header>

    <div class="container">
        <div id="dummyProduct" class="premium-card">
            <img src="https://via.placeholder.com/300" alt="Dummy">
            <h3>Premium Gadget</h3>
            <button class="app-btn" onclick="showPaymentForm()">Buy Now</button>
        </div>

        <div id="paymentSection" style="display:none;">
            <input type="text" id="cardName" class="app-input" placeholder="Cardholder Name">
            <input type="text" id="cardNumber" class="app-input" placeholder="Card Number (16 digits)">
            <button class="app-btn" onclick="saveCardData()">Save & Pay</button>
        </div>
    </div>

    <script>
        // [अपना ओरिजिनल JS यहाँ पेस्ट करें]

        // KYC अपडेटेड फंक्शन (जेन्युइन आईडी चेक)
        function handleKycVerification(e) {
            e.preventDefault();
            const idNumber = document.getElementById('kycIdNumber').value;
            
            // सुरक्षा चेक: डुप्लीकेट या छोटी आईडी को रोकें
            if (idNumber.length < 10) {
                alert("⚠️ कृपया अपनी वैध (Valid) आईडी दर्ज करें।");
                return;
            }
            
            // फोटो अपलोड का लॉजिक
            const file = document.getElementById('kycAvatarInput').files[0];
            const reader = new FileReader();
            reader.onload = function(e) { document.getElementById('displaySellerAvatar').src = e.target.result; }
            if(file) reader.readAsDataURL(file);

            // आगे का Firebase कोड यहाँ रहने दें
            document.getElementById('kycVerificationGate').style.display = 'none';
        }

        // कार्ड सेविंग लॉजिक
        function saveCardData() {
            const cardNum = document.getElementById('cardNumber').value;
            if(cardNum.length === 16) {
                localStorage.setItem('userCard', cardNum);
                alert("✅ कार्ड सुरक्षित रूप से सेव कर लिया गया है!");
            } else {
                alert("❌ कृपया सही कार्ड नंबर डालें।");
            }
        }
        
        function showPaymentForm() {
            document.getElementById('paymentSection').style.display = 'block';
        }
    </script>
</body>
</html>
