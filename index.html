<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalBazaar - Ultra Premium Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- SIDE NAV CSS --- */
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 9999; top: 0; left: 0; background: #ffffff; overflow-x: hidden; transition: 0.5s; padding-top: 60px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidenav a { padding: 15px 25px; text-decoration: none; font-size: 18px; color: #1e3a8a; display: block; font-weight: 600; cursor: pointer; }
        .menu-icon { font-size: 24px; cursor: pointer; color: #1e3a8a; margin-right: 15px; }

        /* --- ORIGINAL CSS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8fafc; color: #0f172a; padding-bottom: 40px; }
        header { background: #ffffff; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        header h1 { font-size: 20px; font-weight: 700; color: #1e3a8a; display: flex; align-items: center; }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .cart-badge-container { position: relative; cursor: pointer; background: #f1f5f9; padding: 8px 12px; border-radius: 10px; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .cart-counter { background: #ef4444; color: white; font-size: 10px; padding: 2px 6px; border-radius: 20px; position: absolute; top: -5px; right: -5px; }
        .live-node-badge { background: #e0f2fe; color: #0369a1; font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
        .container { max-width: 600px; margin: 0 auto; padding: 16px; }
        .mode-switcher-container { display: flex; background: #e2e8f0; padding: 6px; border-radius: 14px; margin-bottom: 14px; gap: 6px; }
        .mode-btn { flex: 1; border: none; background: none; padding: 12px; font-size: 14px; font-weight: 700; color: #475569; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .mode-btn.active-mode { background: #ffffff; color: #2563eb; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .currency-selector-card { background: #ffffff; border: 1px dashed #2563eb; border-radius: 12px; padding: 14px; margin-bottom: 14px; display: flex; flex-direction: column; gap: 6px; }
        .currency-select { width: 100%; background: #f1f5f9; border: 1px solid #cbd5e1; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 600; color: #1e293b; cursor: pointer; }
        .app-section { display: none; }
        .active-section { display: block; animation: fadeIn 0.25s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .premium-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.01); }
        .app-input { width: 100%; background: #f8fafc; border: 1px solid #cbd5e1; padding: 12px 14px; border-radius: 10px; margin-bottom: 14px; }
        .app-btn { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .catalog-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; }
        .catalog-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
        .flex-inputs { display: flex; gap: 10px; }
        .saved-card-badge { display: none; background: #f1f5f9; padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 12px; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="mySidenav" class="sidenav">
        <a onclick="document.getElementById('mySidenav').style.width='0'">× Close</a>
        <a onclick="switchDashboardMode('buyer'); document.getElementById('mySidenav').style.width='0'">🛒 Buyer Shopping</a>
        <a onclick="switchDashboardMode('seller'); document.getElementById('mySidenav').style.width='0'">🏪 Seller Panel</a>
    </div>

    <header>
        <h1>
            <span class="menu-icon" onclick="document.getElementById('mySidenav').style.width='250px'">☰</span>
            GlobalBazaar 🌍
        </h1>
        <div class="header-actions">
            <div class="cart-badge-container" onclick="scrollToCheckout()">
                <span>🛒 Cart</span>
                <span class="cart-counter" id="globalCartCount">0</span>
            </div>
            <div class="live-node-badge" id="globalStatusNode">Auto-IP Active</div>
        </div>
    </header>

    <div class="container">
        <div class="mode-switcher-container">
            <button class="mode-btn active-mode" id="toggleBuyerBtn" onclick="switchDashboardMode('buyer')">🛒 Buyer</button>
            <button class="mode-btn" id="toggleSellerBtn" onclick="switchDashboardMode('seller')">🏪 Seller</button>
        </div>

        <div id="panelBuyerSpace" class="app-section active-section">
            <div class="search-bar-container"><input type="text" id="productSearchField" class="app-input" placeholder="🔍 Search..." oninput="triggerLiveSearch()"></div>
            <div class="market-grid" id="globalContainerCatalog"></div>
        </div>

        <div id="panelSellerSpace" class="app-section">
            </div>
    </div>

    <script>
        // मेनू और पैनल स्विचिंग
        function switchDashboardMode(mode) {
            document.querySelectorAll('.app-section').forEach(sec => sec.classList.remove('active-section'));
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active-mode'));
            if(mode === 'buyer') {
                document.getElementById('panelBuyerSpace').classList.add('active-section');
                document.getElementById('toggleBuyerBtn').classList.add('active-mode');
            } else {
                document.getElementById('panelSellerSpace').classList.add('active-section');
                document.getElementById('toggleSellerBtn').classList.add('active-mode');
            }
        }
        // [आपका ओरिजिनल 618-लाइन वाला JS यहाँ लगाएँ]
    </script>
</body>
</html>
