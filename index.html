<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        .header { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 10px; text-align: center; }
        .logo { font-size: 24px; font-weight: 900; color: #1e3a8a; margin-bottom: 10px; }
        .top-controls { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .role-btns { display: flex; gap: 5px; }
        .section { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px; border: none; border-radius: 5px; cursor: pointer; background: #1e3a8a; color: white; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">GLOBALBAZAAR 🌍</div>
    <div class="top-controls">
        <select>
            <option>SAR (Saudi)</option><option>AED (UAE)</option><option>KWD (Kuwait)</option>
            <option>QAR (Qatar)</option><option>OMR (Oman)</option><option>BHD (Bahrain)</option>
            <option>USD ($)</option><option>EUR (€)</option><option>GBP (£)</option>
            <option>INR (₹)</option><option>PKR (Rs)</option>
        </select>
        <div class="role-btns">
            <button onclick="show('buyer')">Buyer</button>
            <button onclick="show('seller')">Seller</button>
        </div>
    </div>
</div>

<div id="buyer" class="section">
    <h3>🛒 Buyer Dashboard</h3>
    <input type="text" placeholder="Search products...">
    <select><option>Select Category</option></select>
    <div class="product">Product: Smart Watch - SAR 187.50</div>
    <button>Add to Cart</button>
    <hr>
    <input placeholder="Shipping Address">
    <input placeholder="Phone Number">
    <input placeholder="Card Details (Payment)">
    <button style="background:green;">Pay & Confirm</button>
    <p>Tracking #: GB-9988</p>
</div>

<div id="seller" class="section" style="display:none;">
    <h3>🏪 Seller Portal</h3>
    <input placeholder="Sign Up / Login Email">
    <input placeholder="KYC: ID/License">
    <input placeholder="Bank IBAN">
    <input type="file" placeholder="Profile Pic">
    <hr>
    <input placeholder="Product Name">
    <select><option>Category</option></select>
    <input type="file" placeholder="Product Picture">
    <button style="background:green;">List Product</button>
    <hr>
    <p>Wallet: SAR 1,250</p>
    <button style="background:red;">Withdraw Funds</button>
</div>

<script>
    function show(role) {
        document.getElementById('buyer').style.display = role === 'buyer' ? 'block' : 'none';
        document.getElementById('seller').style.display = role === 'seller' ? 'block' : 'none';
    }
</script>

</body>
</html>
