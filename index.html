<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalBazaar Professional</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .logo { font-weight: 900; color: #1e3a8a; font-size: 20px; }
        .btn-group { display: flex; gap: 5px; }
        button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; background: #1e3a8a; color: white; }
        .section { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header-top">
    <div class="logo">GLOBALBAZAAR 🌍</div>
    <select style="width: auto;">
        <option>SAR (Saudi)</option><option>AED (UAE)</option><option>KWD (Kuwait)</option>
        <option>QAR (Qatar)</option><option>OMR (Oman)</option><option>BHD (Bahrain)</option>
        <option>USD ($)</option><option>EUR (€)</option><option>GBP (£)</option>
        <option>INR (₹)</option><option>PKR (Rs)</option>
    </select>
    <div class="btn-group">
        <button>Buyer</button>
        <button>Seller</button>
    </div>
</div>

<div class="section">
    <h3>🛒 Buyer Portal</h3>
    <input type="text" placeholder="Search products...">
    <select><option>Select Category</option><option>Electronics</option><option>Fashion</option><option>Home</option></select>
    <div id="cart">
        <p>Smart Watch - SAR 187.50 <button>Add to Cart</button></p>
    </div>
    <hr>
    <input placeholder="Full Shipping Address">
    <input placeholder="Phone Number">
    <input placeholder="Card Number (Payment)">
    <button style="background: green;">Pay & Confirm Order</button>
    <p><i>Tracking ID: #GB-998877</i></p>
</div>

<div class="section">
    <h3>🏪 Seller Portal</h3>
    <input placeholder="Full Name">
    <input placeholder="Email Verification">
    <input placeholder="Phone Number">
    <input placeholder="National ID / KYC">
    <input placeholder="Bank IBAN for Withdrawal">
    <input type="file" placeholder="Profile Picture">
    <hr>
    <input placeholder="Product Name">
    <input placeholder="Product Price">
    <select><option>Choose Category</option></select>
    <input type="file" placeholder="Product Picture">
    <button style="background: #059669;">List Product</button>
    <hr>
    <p>Wallet Balance: <b>SAR 1,250.00</b></p>
    <button style="background: #dc2626;">Withdraw Funds</button>
</div>

</body>
</html>
