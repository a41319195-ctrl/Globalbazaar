<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GlobalBazaar - Premium Commerce Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f8fafc;
            color: #0f172a;
            padding-bottom: 80px;
        }

        /* HEADER: Left Menu | Center Logo | Right Currency */
        header {
            background: #ffffff;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-icon {
            font-size: 28px;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
            padding: 6px 10px;
            border-radius: 12px;
            transition: 0.2s;
        }

        .menu-icon:hover {
            background: #f1f5f9;
        }

        .logo-center {
            font-size: 20px;
            font-weight: 700;
            color: #1e3a8a;
            letter-spacing: -0.3px;
        }

        /* Currency dropdown in header (right side) */
        .header-currency {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 8px 12px;
            border-radius: 28px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }

        .live-node-badge {
            background: #e0f2fe;
            color: #0369a1;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 600;
            margin-left: 6px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }

        /* Mode Switcher */
        .mode-switcher-container {
            display: flex;
            background: #e2e8f0;
            padding: 6px;
            border-radius: 14px;
            margin-bottom: 20px;
            gap: 6px;
        }

        .mode-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            color: #475569;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .mode-btn.active-mode {
            background: #ffffff;
            color: #2563eb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .app-section { display: none; }
        .active-section { display: block; animation: fadeIn 0.25s ease-in-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .premium-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.01);
        }

        .app-input {
            width: 100%;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
            color: #334155;
            margin-bottom: 14px;
        }

        .app-btn {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .market-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .catalog-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px;
            transition: all 0.2s;
        }
        .catalog-card img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .catalog-card h4 {
            font-size: 13px;
            font-weight: 600;
            color: #1e293b;
        }
        .catalog-card .price {
            color: #2563eb;
            font-weight: 700;
            font-size: 14px;
            margin: 4px 0;
        }
        .flex-inputs { display: flex; gap: 10px; }
        .saved-card-badge {
            background: #f1f5f9;
            border: 1px dashed #cbd5e1;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 12px;
            display: none;
            justify-content: space-between;
        }
        .invoice-line {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 10px 0;
            border-bottom: 1px dashed #e2e8f0;
        }
        .invoice-total {
            font-weight: 700;
            color: #10b981;
            font-size: 16px;
            border-bottom: none;
            padding-top: 14px;
        }

        /* FIXED CART BUTTON - BOTTOM RIGHT CORNER */
        .fixed-cart-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            z-index: 1000;
            transition: 0.2s;
        }
        .fixed-cart-btn:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
        .cart-fixed-counter {
            background: #ef4444;
            color: white;
            font-size: 13px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 40px;
        }

        .seller-search-cat-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .seller-search-cat-row input {
            flex: 2;
            margin-bottom: 0;
        }
        .seller-search-cat-row select {
            flex: 1;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 12px;
            font-size: 13px;
        }
        .badge-verified {
            background: #dcfce7;
            color: #15803d;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<!-- HEADER: Left Menu | Center Logo | Right Currency -->
<header>
    <button class="menu-icon" id="globalMenuBtn" onclick="alert('📱 Navigation\n• Buyer Mode\n• Seller Mode\n• Global Settlement')">☰</button>
    <div class="logo-center">GlobalBazaar 🌍</div>
    <select id="headerCurrencySelect" class="header-currency" onchange="applyGlobalCurrencyConversion()">
        <option value="SAR">🇸🇦 SAR</option>
        <option value="AED">🇦🇪 AED</option>
        <option value="KWD">🇰🇼 KWD</option>
        <option value="QAR">🇶🇦 QAR</option>
        <option value="OMR">🇴🇲 OMR</option>
        <option value="BHD">🇧🇭 BHD</option>
        <option value="USD">🇺🇸 USD</option>
        <option value="EUR">🇪🇺 EUR</option>
        <option value="GBP">🇬🇧 GBP</option>
        <option value="INR">🇮🇳 INR</option>
        <option value="PKR">🇵🇰 PKR</option>
    </select>
</header>

<div class="container">
    <!-- MODE SWITCHER -->
    <div class="mode-switcher-container">
        <button class="mode-btn active-mode" id="toggleBuyerBtn" onclick="switchDashboardMode('buyer')">🛒 Buyer Shopping</button>
        <button class="mode-btn" id="toggleSellerBtn" onclick="switchDashboardMode('seller')">🏪 Seller Panel</button>
    </div>

    <!-- =============== BUYER SECTION =============== -->
    <div id="panelBuyerSpace" class="app-section active-section">
        <div class="search-bar-container">
            <input type="text" id="productSearchField" class="app-input" placeholder="🔍 Search products instantly..." oninput="triggerLiveSearch()">
        </div>
        <div class="market-grid" id="globalContainerCatalog">
            <div class="catalog-card" data-base-usd="50.00">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" alt="Watch">
                <h4>Luxury Smart Watch</h4>
                <div class="price class-converted-price"></div>
                <button class="app-btn" style="padding:8px; font-size:12px; background:#0f172a;" onclick="addItemToCart('Luxury Smart Watch', 50.00)">Buy Now</button>
            </div>
            <div class="catalog-card" data-base-usd="120.00">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" alt="Headphones">
                <h4>Premium Headphones</h4>
                <div class="price class-converted-price"></div>
                <button class="app-btn" style="padding:8px; font-size:12px; background:#0f172a;" onclick="addItemToCart('Premium Headphones', 120.00)">Buy Now</button>
            </div>
        </div>

        <div id="checkoutFormBlock" style="display: none;">
            <div class="premium-card" style="border-left:4px solid #10b981;">
                <h2>📋 Localized Invoice</h2>
                <div id="invoiceBreakdownContainer"></div>
            </div>
            <div class="premium-card">
                <h2>💳 Secure Checkout</h2>
                <div id="savedCardBox" class="saved-card-badge"><span>🔒 Vault: <strong id="savedCardDetail">None</strong></span><button onclick="clearSavedBuyerCard()" style="background:none;border:none;color:#ef4444;">Remove</button></div>
                <form id="buyerPaymentCheckoutForm" onsubmit="executeEscrowPayment(event)">
                    <input type="text" id="buyerCardName" placeholder="Cardholder Name" class="app-input" required>
                    <input type="text" id="buyerCardNumber" placeholder="Card Number" class="app-input" required>
                    <div class="flex-inputs">
                        <input type="text" id="buyerCardExpiry" placeholder="MM/YY" class="app-input" required>
                        <input type="password" id="buyerCardCvv" placeholder="CVV" class="app-input" required>
                    </div>
                    <input type="text" id="buyerShippingAddr" placeholder="Address" class="app-input" required>
                    <div class="flex-inputs">
                        <input type="text" id="buyerCity" placeholder="City" class="app-input" required>
                        <input type="text" id="buyerZip" placeholder="Zip" class="app-input" required>
                    </div>
                    <div style="display:flex; gap:8px; margin-bottom:14px;"><input type="checkbox" id="saveCardCheckbox"><label>Save card</label></div>
                    <button type="submit" class="app-btn" id="payButtonText">Pay</button>
                </form>
            </div>
        </div>
    </div>

    <!-- =============== SELLER SECTION =============== -->
    <div id="panelSellerSpace" class="app-section">
        <div id="kycVerificationGate" class="premium-card">
            <h2>Merchant KYC & Bank Node</h2>
            <form id="kycSubmissionForm" onsubmit="handleKycVerification(event)">
                <input type="file" id="kycAvatarInput" class="app-input" accept="image/*" required>
                <input type="text" id="kycFullName" placeholder="Full Name" class="app-input" required>
                <input type="text" id="kycShopName" placeholder="Shop Name" class="app-input" required>
                <select class="app-input" required><option>National ID / Iqama</option><option>Passport</option></select>
                <input type="text" placeholder="ID Number" class="app-input" required>
                <input type="text" placeholder="Bank Name" class="app-input" required>
                <input type="text" placeholder="IBAN" class="app-input" required>
                <button type="submit" class="app-btn">Verify & Sync Node</button>
            </form>
        </div>

        <div id="sellerDashboardContent" style="display: none;">
            <div class="premium-card" style="background:#1e293b; color:white;">
                <div style="display:flex; gap:12px; align-items:center; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:12px;">
                    <img id="displaySellerAvatar" style="width:50px; height:50px; border-radius:50%; object-fit:cover;" src="">
                    <div><h3 id="displayShopName">Merchant Hub</h3><p id="displayMerchantName"></p></div>
                </div>
                <p>Unified Revenue</p>
                <h1 id="merchantLedgerBalanceString" style="color:#34d399;">$540.00</h1>
                <button onclick="alert('Payout triggered')" style="background:#3b82f6; padding:8px; border-radius:8px; color:white; border:none;">Withdraw</button>
            </div>

            <div class="premium-card">
                <h2>📦 Create New Product</h2>
                <form id="merchantInventoryForm">
                    <input type="text" id="mProdName" placeholder="Product Name" class="app-input" required>
                    <input type="number" id="mProdPrice" placeholder="Price (USD)" class="app-input" required>
                    <input type="url" id="mProdImg" placeholder="Image URL" class="app-input" required>
                    <button type="submit" class="app-btn">Publish Globally</button>
                </form>
            </div>

            <div class="premium-card">
                <h2>🔎 Seller Tools: Search & Category Filter</h2>
                <div class="seller-search-cat-row">
                    <input type="text" id="sellerProductSearch" class="app-input" placeholder="Search in your products..." oninput="filterSellerProducts()">
                    <select id="sellerCategoryFilter" onchange="filterSellerProducts()">
                        <option value="all">All Categories</option>
                        <option value="electronics">Electronics</option>
                        <option value="luxury">Luxury</option>
                        <option value="accessories">Accessories</option>
                    </select>
                </div>
                <div id="sellerProductListPreview" style="font-size:13px; color:#334155; background:#f8fafc; padding:10px; border-radius:10px;">
                    ⚡ Use search + category to filter your live catalog.
                </div>
            </div>
        </div>
    </div>
</div>

<!-- FIXED CART BUTTON - BOTTOM RIGHT CORNER -->
<button class="fixed-cart-btn" onclick="scrollToCheckout()">
    🛒 Cart
    <span class="cart-fixed-counter" id="globalCartCount">0</span>
</button>

<script>
    const FX_MATRIX = { SAR:3.75, AED:3.67, KWD:0.31, QAR:3.64, OMR:0.38, BHD:0.38, USD:1.0, EUR:0.92, GBP:0.78, INR:83.50, PKR:278.20 };
    const SYMBOLS = { SAR:"SAR ", AED:"AED ", KWD:"KWD ", QAR:"QAR ", OMR:"OMR ", BHD:"BHD ", USD:"$", EUR:"€", GBP:"£", INR:"₹", PKR:"₨" };
    
    let globalSelectedCurrency = "SAR";
    let cartItemsCount = 0;
    let currentActiveItemName = "", currentActiveItemPriceUSD = 0;
    let finalizedCheckoutPriceString = "";

    window.onload = () => {
        document.getElementById('headerCurrencySelect').value = "SAR";
        applyGlobalCurrencyConversion();
        checkSavedCardsInVault();
        updateCartUI();
    };

    function updateCartUI() {
        document.getElementById('globalCartCount').innerText = cartItemsCount;
    }

    function switchDashboardMode(mode) {
        document.querySelectorAll('.app-section').forEach(sec => sec.classList.remove('active-section'));
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active-mode'));
        if(mode === 'buyer') {
            document.getElementById('panelBuyerSpace').classList.add('active-section');
            document.getElementById('toggleBuyerBtn').classList.add('active-mode');
        } else {
            document.getElementById('panelSellerSpace').classList.add('active-section');
            document.getElementById('toggleSellerBtn').classList.add('active-mode');
            applyGlobalCurrencyConversion();
        }
    }

    function applyGlobalCurrencyConversion() {
        globalSelectedCurrency = document.getElementById('headerCurrencySelect').value;
        const rate = FX_MATRIX[globalSelectedCurrency];
        const symbol = SYMBOLS[globalSelectedCurrency];
        document.querySelectorAll('.catalog-card').forEach(card => {
            const usd = parseFloat(card.getAttribute('data-base-usd'));
            const local = (usd * rate).toFixed(2);
            card.querySelector('.class-converted-price').innerText = `${symbol}${local}`;
        });
        const merchantUSD = 540.00;
        const merchantBalanceElem = document.getElementById('merchantLedgerBalanceString');
        if(merchantBalanceElem) merchantBalanceElem.innerHTML = `${symbol}${(merchantUSD * rate).toFixed(2)}`;
        if(document.getElementById('checkoutFormBlock').style.display === 'block') renderInvoiceBreakdown();
    }

    function triggerLiveSearch() {
        const q = document.getElementById('productSearchField').value.toLowerCase();
        document.querySelectorAll('.catalog-card').forEach(card => {
            const title = card.querySelector('h4').innerText.toLowerCase();
            card.style.display = title.includes(q) ? "block" : "none";
        });
    }

    function filterSellerProducts() {
        const searchVal = document.getElementById('sellerProductSearch').value.toLowerCase();
        const category = document.getElementById('sellerCategoryFilter').value;
        let previewHtml = `<strong>Filtered results (${category}) :</strong><br>`;
        let anyMatch = false;
        document.querySelectorAll('.catalog-card').forEach(card => {
            const title = card.querySelector('h4').innerText.toLowerCase();
            const matchesSearch = title.includes(searchVal);
            const fakeCatCheck = (category === 'all') || (category === 'electronics' && title.includes('headphone')) || (category === 'luxury' && title.includes('luxury')) || (category === 'accessories');
            if(matchesSearch && (category === 'all' || fakeCatCheck)) {
                previewHtml += `✅ ${card.querySelector('h4').innerText}<br>`;
                anyMatch = true;
            }
        });
        if(!anyMatch) previewHtml += "⚠️ No matching products in this view.";
        document.getElementById('sellerProductListPreview').innerHTML = previewHtml;
    }

    function addItemToCart(name, priceUSD) {
        cartItemsCount++;
        updateCartUI();
        currentActiveItemName = name;
        currentActiveItemPriceUSD = priceUSD;
        renderInvoiceBreakdown();
        document.getElementById('checkoutFormBlock').style.display = 'block';
    }

    function renderInvoiceBreakdown() {
        const rate = FX_MATRIX[globalSelectedCurrency];
        const symbol = SYMBOLS[globalSelectedCurrency];
        const freightUSD = 12.50, surchargeUSD = 6.00;
        const totalUSD = currentActiveItemPriceUSD + freightUSD + surchargeUSD;
        const localTotal = (totalUSD * rate).toFixed(2);
        finalizedCheckoutPriceString = `${symbol}${localTotal}`;
        document.getElementById('payButtonText').innerHTML = `Pay ${finalizedCheckoutPriceString}`;
        document.getElementById('invoiceBreakdownContainer').innerHTML = `
            <div class="invoice-line"><span>${currentActiveItemName}</span><span>${symbol}${(currentActiveItemPriceUSD*rate).toFixed(2)}</span></div>
            <div class="invoice-line"><span>Logistics</span><span>${symbol}${(freightUSD*rate).toFixed(2)}</span></div>
            <div class="invoice-line"><span>Surcharge</span><span>${symbol}${(surchargeUSD*rate).toFixed(2)}</span></div>
            <div class="invoice-line invoice-total"><span>Total</span><span>${finalizedCheckoutPriceString}</span></div>
        `;
    }

    function scrollToCheckout() { 
        if(cartItemsCount>0) {
            document.getElementById('checkoutFormBlock').scrollIntoView({behavior:'smooth'});
        } else {
            alert("Cart is empty! Add a product first.");
        }
    }

    function executeEscrowPayment(e) {
        e.preventDefault();
        if(document.getElementById('saveCardCheckbox').checked) localStorage.setItem('vault_card_num', document.getElementById('buyerCardNumber').value);
        alert(`✅ Payment successful: ${finalizedCheckoutPriceString} (Escrow secured)`);
        document.getElementById('checkoutFormBlock').style.display = 'none';
        cartItemsCount = 0;
        updateCartUI();
        checkSavedCardsInVault();
    }
    
    function checkSavedCardsInVault() { 
        if(localStorage.getItem('vault_card_num')) {
            document.getElementById('savedCardBox').style.display = 'flex';
            document.getElementById('savedCardDetail').innerText = "Card saved";
        }
    }
    
    function clearSavedBuyerCard() { 
        localStorage.clear(); 
        document.getElementById('savedCardBox').style.display = 'none'; 
        alert("Cleared");
    }
    
    function handleKycVerification(e) {
        e.preventDefault();
        const name = document.getElementById('kycFullName').value;
        const shop = document.getElementById('kycShopName').value;
        const file = document.getElementById('kycAvatarInput').files[0];
        if(file) { const reader = new FileReader(); reader.onload = ev => document.getElementById('displaySellerAvatar').src = ev.target.result; reader.readAsDataURL(file); }
        document.getElementById('displayShopName').innerText = shop;
        document.getElementById('displayMerchantName').innerText = "Operator: "+name;
        document.getElementById('kycVerificationGate').style.display = 'none';
        document.getElementById('sellerDashboardContent').style.display = 'block';
        applyGlobalCurrencyConversion();
    }
    
    document.getElementById('merchantInventoryForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('mProdName').value;
        const price = parseFloat(document.getElementById('mProdPrice').value);
        const img = document.getElementById('mProdImg').value;
        document.getElementById('globalContainerCatalog').insertAdjacentHTML('beforeend', `
            <div class="catalog-card" data-base-usd="${price}">
                <img src="${img}" alt="${name}">
                <h4>${name}</h4>
                <div class="price class-converted-price"></div>
                <button class="app-btn" style="padding:8px;font-size:12px;background:#0f172a;" onclick="addItemToCart('${name}', ${price})">Buy Now</button>
            </div>
        `);
        alert("Product published to global feed!");
        document.getElementById('merchantInventoryForm').reset();
        applyGlobalCurrencyConversion();
        switchDashboardMode('buyer');
    });
</script>
</body>
</html>
