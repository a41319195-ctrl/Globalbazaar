<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalBazaar - Professional Matrix</title>
    <style>
        /* [आपका पूरा 600+ लाइन वाला CSS यहाँ रखें] */
        
        /* नया: साइड मेनू का स्टाइल */
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: #fff; overflow-x: hidden; transition: 0.5s; padding-top: 60px; box-shadow: 2px 0 5px rgba(0,0,0,0.2); }
        .sidenav a { padding: 15px; text-decoration: none; font-size: 18px; color: #1e3a8a; display: block; cursor: pointer; }
        .menu-btn { font-size: 24px; cursor: pointer; color: #1e3a8a; margin-right: 15px; }
        
        /* पेमेंट पेज स्टाइल */
        #paymentPage { padding: 20px; background: white; border-radius: 16px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

    <div id="mySidenav" class="sidenav">
        <a onclick="closeNav()">× Close</a>
        <a onclick="switchDashboardMode('buyer'); closeNav()">🛒 Buyer Shopping</a>
        <a onclick="switchDashboardMode('seller'); closeNav()">🏪 Seller Panel</a>
    </div>

    <header>
        <div style="display:flex; align-items:center;">
            <span class="menu-btn" onclick="openNav()">☰</span>
            <h1>GlobalBazaar 🌍</h1>
        </div>
        </header>

    <div class="container">
        <div id="panelBuyerSpace" class="app-section active-section">
            <input type="text" id="productSearchField" class="app-input" placeholder="🔍 Search products...">
            <div class="market-grid" id="globalContainerCatalog">
                <div class="catalog-card">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" alt="Watch">
                    <h4>Premium Smart Watch</h4>
                    <button class="app-btn" onclick="showPaymentPage('Premium Smart Watch', 99)">Buy Now</button>
                </div>
            </div>
        </div>

        <div id="paymentPage" style="display:none;" class="premium-card">
            <h2>Payment for <span id="itemName"></span></h2>
            <input type="text" id="buyerCard" class="app-input" placeholder="Enter 16 digit Card Number">
            <button class="app-btn" onclick="processPayment()">Confirm & Pay</button>
        </div>

        <div id="panelSellerSpace" class="app-section" style="display:none;">
            </div>
    </div>

    <script>
        // [आपका पूरा ओरिजिनल JavaScript यहाँ रखें]

        // 1. मेनू कंट्रोल फंक्शन
        function openNav() { document.getElementById("mySidenav").style.width = "250px"; }
        function closeNav() { document.getElementById("mySidenav").style.width = "0"; }

        // 2. सेलर पैनल स्विचिंग (पुराना फंक्शन ओवरराइड)
        function switchDashboardMode(mode) {
            document.getElementById('panelBuyerSpace').style.display = (mode === 'buyer') ? 'block' : 'none';
            document.getElementById('panelSellerSpace').style.display = (mode === 'seller') ? 'block' : 'none';
            document.getElementById('paymentPage').style.display = 'none';
        }

        // 3. पेमेंट पेज का लॉजिक
        function showPaymentPage(name, price) {
            document.getElementById('panelBuyerSpace').style.display = 'none';
            document.getElementById('paymentPage').style.display = 'block';
            document.getElementById('itemName').innerText = name;
        }

        function processPayment() {
            const card = document.getElementById('buyerCard').value;
            if(card.length === 16) {
                localStorage.setItem('buyer_card', card);
                alert("✅ पेमेंट सफल! आपका कार्ड सुरक्षित रूप से स्टोर हो गया है।");
                location.reload(); 
            } else {
                alert("❌ कृपया सही कार्ड नंबर डालें।");
            }
        }
        
        // 4. KYC लॉजिक (जेन्युइन चेक)
        function handleKycVerification(e) {
            e.preventDefault();
            const idNumber = document.getElementById('kycIdNumber').value;
            if (idNumber.length < 10) { alert("⚠️ कृपया अपनी वैध (Valid) आईडी दर्ज करें।"); return; }
            
            // ... (आपका ओरिजिनल Firebase सेविंग लॉजिक यहाँ जारी रखें)
        }
    </script>
</body>
</html>
