<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GlobalBazaar - Multi-Seller Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #f5f7fb;
            overflow-x: hidden;
            padding-bottom: 95px;
            font-size: 17px;
        }

        /* HEADER */
        .header {
            background: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #e9eef3;
        }
        .menu-icon {
            background: #f0f3f9;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 30px;
            font-size: 28px;
            cursor: pointer;
        }
        .brand {
            font-weight: 800;
            font-size: 24px;
            background: linear-gradient(135deg, #1e2b6e, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .currency-select {
            background: #f0f3f9;
            border: none;
            padding: 12px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
        }
        .icon-btn {
            background: #f0f3f9;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 30px;
            font-size: 24px;
            position: relative;
            cursor: pointer;
        }
        .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: white;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 30px;
        }

        /* DRAWER */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(3px);
            z-index: 200;
            display: none;
        }
        .drawer {
            position: fixed;
            top: 0;
            left: -85%;
            width: 80%;
            max-width: 330px;
            height: 100%;
            background: white;
            z-index: 201;
            transition: left 0.3s ease;
            border-radius: 0 28px 28px 0;
            padding: 20px 0;
            overflow-y: auto;
        }
        .drawer.open { left: 0; }
        .drawer-header { padding: 24px 20px; border-bottom: 1px solid #eef2f8; }
        .drawer-header h2 { font-size: 26px; }
        .drawer-header p { font-size: 15px; }
        .drawer-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            font-weight: 600;
            font-size: 19px;
            cursor: pointer;
            margin: 6px 12px;
            border-radius: 18px;
        }
        .drawer-item:active { background: #f0f3f9; }

        /* MAIN */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }
        .mode-tabs {
            display: flex;
            background: white;
            padding: 6px;
            border-radius: 60px;
            margin-bottom: 24px;
            gap: 8px;
        }
        .mode-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 16px;
            font-weight: 700;
            border-radius: 40px;
            font-size: 17px;
            cursor: pointer;
        }
        .mode-btn.active {
            background: #1e2b6e;
            color: white;
        }
        .section { display: none; }
        .section.active { display: block; }

        /* CATEGORIES */
        .cat-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 0 18px;
        }
        .cat-pill {
            background: white;
            padding: 12px 26px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            white-space: nowrap;
        }
        .cat-pill.active { background: #1e2b6e; color: white; }

        /* PRODUCT GRID */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-top: 12px;
        }
        .product-card {
            background: white;
            border-radius: 28px;
            padding: 16px;
            cursor: pointer;
            border: 1px solid #eef2f8;
        }
        .product-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 20px; }
        .seller-name-tag { font-size: 13px; color: #2563eb; margin: 12px 0 8px; font-weight: 700; }
        .product-card h4 { font-size: 17px; margin-bottom: 6px; }
        .prod-price { font-weight: 800; font-size: 20px; color: #1e2b6e; margin-top: 8px; }
        .card-actions { display: flex; gap: 12px; margin-top: 16px; }
        .btn-sm { flex: 1; padding: 12px; border-radius: 60px; font-weight: 700; font-size: 15px; border: none; cursor: pointer; }
        .btn-buy { background: #0f172a; color: white; }
        .btn-wish { background: #f1f5f9; font-size: 18px; }
        .btn-wish.active { background: #fee2e2; color: #dc2626; }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 300;
            overflow-y: auto;
        }
        .modal-card {
            background: white;
            margin: 50px 20px;
            border-radius: 36px;
            padding: 28px;
        }
        .close-modal { float: right; font-size: 34px; cursor: pointer; }

        /* FORMS */
        .input {
            width: 100%;
            padding: 18px;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            margin-bottom: 18px;
            font-size: 17px;
        }
        .input-opt {
            width: 100%;
            padding: 18px;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            margin-bottom: 18px;
            font-size: 17px;
            background: #fefce8;
        }
        .btn-primary {
            background: #1e2b6e;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 18px;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-danger {
            background: #dc2626;
        }
        .fixed-cart {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e2b6e;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 18px 28px;
            display: flex;
            gap: 14px;
            font-weight: 800;
            font-size: 20px;
            z-index: 99;
            cursor: pointer;
        }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .order-card { background: #f8fafc; border-radius: 22px; padding: 18px; margin-bottom: 16px; font-size: 16px; }
        h3 { font-size: 22px; margin-bottom: 14px; }
        h4 { font-size: 18px; margin: 14px 0 10px; }
        .address-section {
            background: #f0f9ff;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #bae6fd;
        }
        .address-section h4 {
            color: #0369a1;
            margin-top: 0;
        }
        .illegal-warning {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 16px;
            font-size: 14px;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="header">
    <button class="menu-icon" id="menuBtn">☰</button>
    <div class="brand">GlobalBazaar 🌍</div>
    <div class="header-right">
        <button class="icon-btn" id="wishlistHeaderBtn">❤️ <span class="badge" id="wishCountHead">0</span></button>
        <select id="currencySelect" class="currency-select">
            <option value="SAR">🇸🇦 SAR</option>
            <option value="AED">🇦🇪 AED</option>
            <option value="KWD">🇰🇼 KWD</option>
            <option value="QAR">🇶🇦 QAR</option>
            <option value="OMR">🇴🇲 OMR</option>
            <option value="BHD">🇧🇭 BHD</option>
            <option value="USD">🇺🇸 USD</option>
            <option value="EUR">🇪🇺 EUR</option>
            <option value="GBP">🇬🇧 GBP</option>
            <option value="INR">🇮🇳 INR</option>
            <option value="PKR">🇵🇰 PKR</option>
            <option value="CNY">🇨🇳 CNY</option>
        </select>
    </div>
</div>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
    <div class="drawer-header"><h2>GlobalBazaar</h2><p>Multi‑Seller Hub</p></div>
    <div class="drawer-item" data-mode="buyer">🛒 Buyer Shopping</div>
    <div class="drawer-item" data-mode="seller">🏪 Seller Dashboard</div>
    <div class="drawer-item" data-mode="profile">👤 My Profile</div>
    <div class="drawer-item" id="drawerWishlist">❤️ My Wishlist</div>
    <div class="drawer-item" id="drawerSupport">📞 Support</div>
    <div class="drawer-item" id="drawerLogout">🚪 Logout</div>
</div>

<div class="container">
    <div class="mode-tabs">
        <button class="mode-btn active" data-tab="buyer">🛒 Buyer</button>
        <button class="mode-btn" data-tab="seller">🏪 Seller</button>
        <button class="mode-btn" data-tab="profile">👤 Profile</button>
    </div>

    <!-- BUYER SECTION -->
    <div id="buyerSection" class="section active">
        <div class="cat-scroll" id="catList"></div>
        <input type="text" id="searchInput" class="input" placeholder="🔍 Search products..." oninput="renderProducts()">
        <div class="product-grid" id="productsGrid"></div>
    </div>

    <!-- SELLER SECTION -->
    <div id="sellerSection" class="section">
        <div id="sellerRegisterBox" class="modal-card" style="margin:0; padding:24px;">
            <h2 style="margin-bottom:20px;">🏪 Open Your Shop</h2>
            <form id="sellerRegForm">
                <h4>📸 Profile Picture</h4>
                <input type="file" id="sellerAvatar" accept="image/*" class="input" required>
                <input type="text" id="sellerFullName" placeholder="Full Legal Name" class="input" required>
                <input type="text" id="sellerShopName" placeholder="Shop / Brand Name" class="input" required>
                <input type="email" id="sellerEmail" placeholder="Email" class="input" required>
                <input type="tel" id="sellerPhone" placeholder="📞 Phone Number (WhatsApp)" class="input" required>
                <input type="password" id="sellerPassword" placeholder="Password" class="input" required>
                
                <h4>📍 Shop Address (for pickup)</h4>
                <input type="text" id="sellerStreet" placeholder="Street / Area / Village" class="input" required>
                <input type="text" id="sellerCity" placeholder="City / Town" class="input" required>
                <input type="text" id="sellerState" placeholder="State / Province" class="input" required>
                <input type="text" id="sellerCountryReg" placeholder="Country" class="input" required>
                
                <h4>🆔 KYC Documents</h4>
                <select id="sellerIdType" class="input"><option>National ID / Iqama</option><option>Passport</option></select>
                <input type="text" id="sellerIdNumber" placeholder="ID Number" class="input" required>
                <input type="file" id="sellerIdImage" accept="image/*" class="input" required>
                
                <h4>🏦 Bank Account (for payout)</h4>
                <input type="text" id="sellerBank" placeholder="Bank Name" class="input" required>
                <input type="text" id="sellerIban" placeholder="IBAN / Account Number" class="input" required>
                <input type="text" id="sellerSwift" placeholder="Swift / Routing Code" class="input" required>
                
                <button type="submit" class="btn-primary">✅ Register Shop</button>
            </form>
        </div>
        <div id="sellerDashboard" style="display:none;"></div>
    </div>

    <!-- PROFILE SECTION -->
    <div id="profileSection" class="section">
        <div id="profileAuthBox" class="modal-card" style="margin:0;">
            <div style="display:flex; gap:12px; margin-bottom:20px;">
                <button id="showLoginBtn" class="btn-primary" style="background:#e2e8f0; color:#000;">Login</button>
                <button id="showSignupBtn" class="btn-primary" style="background:#e2e8f0; color:#000;">Sign Up</button>
            </div>
            <div id="loginFormDiv">
                <input type="email" id="loginEmail" placeholder="Email" class="input">
                <input type="password" id="loginPass" placeholder="Password" class="input">
                <button class="btn-primary" id="doLoginBtn">Login</button>
            </div>
            <div id="signupFormDiv" style="display:none;">
                <input type="text" id="signupName" placeholder="Full Name" class="input">
                <input type="email" id="signupEmail" placeholder="Email" class="input">
                <input type="password" id="signupPass" placeholder="Password" class="input">
                <button class="btn-primary" id="doSignupBtn">Create Account</button>
            </div>
        </div>
        <div id="buyerProfilePanel" style="display:none;">
            <div class="modal-card"><h2>👋 Welcome, <span id="profileName"></span></h2><button class="btn-primary" id="logoutBuyerBtn" style="background:#dc2626;">Logout</button></div>
            <div class="modal-card"><h3>📜 Order History</h3><div id="buyerOrdersList"></div></div>
        </div>
    </div>
</div>

<button class="fixed-cart" id="cartFloatBtn">🛒 Cart <span class="badge" id="cartCountBadge">0</span></button>

<!-- PRODUCT MODAL -->
<div id="productModal" class="modal">
    <div class="modal-card">
        <span class="close-modal" id="closeModalBtn">&times;</span>
        <img id="modalImg" style="width:100%; border-radius:24px; margin:10px 0;">
        <h2 id="modalTitle" style="font-size:26px;"></h2>
        <p id="modalSellerName" style="color:#2563eb; font-size:17px;"></p>
        <p id="modalDesc" style="font-size:16px; margin:12px 0;"></p>
        <h3 id="modalPrice" style="font-size:24px;"></h3>
        <div id="modalStars" style="font-size:22px;"></div>
        <div id="modalReviews"></div>
        <select id="ratingSelect" class="input"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="3">⭐⭐⭐</option><option value="2">⭐⭐</option><option value="1">⭐</option></select>
        <input type="text" id="reviewText" placeholder="Write a review" class="input">
        <button class="btn-primary" id="submitReviewBtn">Submit Review</button>
        <div style="display:flex; gap:10px; margin-top:16px;">
            <button class="btn-primary" id="modalAddCartBtn">Add to Cart</button>
            <button class="btn-primary" id="modalAddWishBtn" style="background:#475569;">❤️ Wishlist</button>
        </div>
    </div>
</div>

<script>
    // ============ ILLEGAL KEYWORDS BLOCKING SYSTEM ============
    const illegalKeywords = [
        // Weapons
        "gun", "pistol", "rifle", "shotgun", "weapon", "bomb", "explosive", "grenade", "ammunition", "bullet",
        "knife", "sword", "dager", "rocket", "missile", "revolver", "firearm", "handgun",
        // Drugs
        "cocaine", "heroin", "weed", "marijuana", "cannabis", "drugs", "narcotics", "lsd", "mdma", "ecstasy",
        "meth", "amphetamine", "opium", "morphine", "fentanyl", "tramadol", "crack",
        // Human Trafficking
        "human trafficking", "slave", "forced labour", "child labour", "sex trafficking", "organ trade",
        // Wildlife
        "ivory", "tiger skin", "elephant tusk", "rhino horn", "pangolin", "endangered species", "animal skin",
        // Counterfeit
        "fake", "replica", "counterfeit", "duplicate", "forged", "copy", "imitation", "knockoff",
        // Adult
        "porn", "adult toy", "nude", "sexual", "xxx", "virginity", "sex",
        // Stolen/Cyber
        "hacked account", "stolen credit card", "fake id", "passport fake", "visa fake"
    ];

    function isProductIllegal(name, description) {
        let checkText = (name + " " + description).toLowerCase();
        for(let keyword of illegalKeywords) {
            if(checkText.includes(keyword)) {
                return { illegal: true, keyword: keyword };
            }
        }
        return { illegal: false };
    }

    // ============ CURRENCY SYSTEM (12 Currencies) ============
    let fx = {
        "SAR": 3.75, "AED": 3.67, "KWD": 0.31, "QAR": 3.64,
        "OMR": 0.38, "BHD": 0.38, "USD": 1.0, "EUR": 0.92,
        "GBP": 0.78, "INR": 83.5, "PKR": 278, "CNY": 7.25
    };
    let sym = {
        "SAR": "SAR ", "AED": "AED ", "KWD": "KWD ", "QAR": "QAR ",
        "OMR": "OMR ", "BHD": "BHD ", "USD": "$", "EUR": "€",
        "GBP": "£", "INR": "₹", "PKR": "₨", "CNY": "¥"
    };
    
    let selectedCurr = "SAR";
    let sellers = JSON.parse(localStorage.getItem('gb_sellers')) || [];
    let products = JSON.parse(localStorage.getItem('gb_products')) || [
        {id:1, sellerId:0, sellerName:"GlobalBazaar", name:"Luxury Smart Watch", price:50, category:"Electronics", image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400", description:"Premium smart watch", rating:4.5, reviews:[], costPrice:25, shippingCostSeller:5, weight:0.3},
        {id:2, sellerId:0, sellerName:"GlobalBazaar", name:"Premium Headphones", price:120, category:"Electronics", image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400", description:"Noise cancellation", rating:4.8, reviews:[], costPrice:60, shippingCostSeller:7, weight:0.5}
    ];
    let buyers = JSON.parse(localStorage.getItem('gb_buyers')) || [];
    let currentBuyer = JSON.parse(localStorage.getItem('gb_current_buyer')) || null;
    let currentSeller = JSON.parse(localStorage.getItem('gb_current_seller')) || null;
    let cart = JSON.parse(localStorage.getItem('gb_cart')) || [];
    let wishlist = JSON.parse(localStorage.getItem('gb_wishlist')) || [];
    let orders = JSON.parse(localStorage.getItem('gb_orders')) || [];
    let payouts = JSON.parse(localStorage.getItem('gb_payouts')) || [];

    let buyerIpCountry = "SA";
    let buyerIpCity = "Riyadh";
    let pendingAddress = null;

    function saveAll() {
        localStorage.setItem('gb_sellers', JSON.stringify(sellers));
        localStorage.setItem('gb_products', JSON.stringify(products));
        localStorage.setItem('gb_buyers', JSON.stringify(buyers));
        localStorage.setItem('gb_current_buyer', JSON.stringify(currentBuyer));
        localStorage.setItem('gb_current_seller', JSON.stringify(currentSeller));
        localStorage.setItem('gb_cart', JSON.stringify(cart));
        localStorage.setItem('gb_wishlist', JSON.stringify(wishlist));
        localStorage.setItem('gb_orders', JSON.stringify(orders));
        localStorage.setItem('gb_payouts', JSON.stringify(payouts));
    }

    async function detectLocation() {
        try {
            let res = await fetch('https://ipapi.co/json/');
            let data = await res.json();
            buyerIpCountry = data.country_code || "SA";
            buyerIpCity = data.city || "Riyadh";
        } catch(e) { buyerIpCountry = "SA"; buyerIpCity = "Riyadh"; }
        renderProducts();
    }
    detectLocation();

    function getShippingCost(sellerCountry, buyerCountry) {
        if(sellerCountry === buyerCountry) return 5;
        let nearby = ["SA","AE","QA","KW","OM","BH"];
        if(nearby.includes(sellerCountry) && nearby.includes(buyerCountry)) return 12;
        return 25;
    }

    function calcFinalPrice(basePrice, sellerCountry) {
        let commission = basePrice > 100 ? 0.03 : (basePrice > 50 ? 0.04 : 0.05);
        let platformFee = basePrice * commission;
        let gatewayFee = basePrice * 0.025;
        let shipping = getShippingCost(sellerCountry, buyerIpCountry);
        let handling = 2;
        let total = basePrice + platformFee + gatewayFee + shipping + handling;
        return { total, shipping, commission: commission*100 };
    }

    function convert(usd) { return (usd * fx[selectedCurr]).toFixed(2); }
    function getSym() { return sym[selectedCurr]; }

    function applyCurrency() {
        selectedCurr = document.getElementById('currencySelect').value;
        renderProducts();
        updateCartUI();
        if(currentSeller) renderSellerDashboard();
    }
    document.getElementById('currencySelect').addEventListener('change', applyCurrency);

    let currentCategory = "All";
    function renderCats() { 
        let cats = ["All", ...new Set(products.map(p=>p.category))]; 
        document.getElementById('catList').innerHTML = cats.map(c => `<div class="cat-pill ${currentCategory===c?'active':''}" data-cat="${c}">${c}</div>`).join('');
        document.querySelectorAll('.cat-pill').forEach(el => el.addEventListener('click', (e) => { currentCategory = e.target.dataset.cat; renderCats(); renderProducts(); }));
    }

    function renderProducts() {
        let search = document.getElementById('searchInput')?.value.toLowerCase() || "";
        let filtered = products.filter(p => (currentCategory==="All" || p.category===currentCategory) && p.name.toLowerCase().includes(search));
        let sellerMap = new Map(sellers.map(s=>[s.id, s]));
        let html = filtered.map(p => {
            let seller = sellerMap.get(p.sellerId) || {shopName:p.sellerName || "GlobalBazaar", country:"SA"};
            let finalObj = calcFinalPrice(p.price, seller.country || "SA");
            return `<div class="product-card" data-id="${p.id}">
                <img src="${p.image}" onerror="this.src='https://placehold.co/200x200'">
                <div class="seller-name-tag">🏪 ${seller.shopName || "GlobalBazaar"}</div>
                <h4>${p.name}</h4>
                <div class="prod-price">${getSym()}${convert(finalObj.total)}</div>
                <div class="card-actions">
                    <button class="btn-sm btn-buy addCartBtn" data-id="${p.id}">Buy</button>
                    <button class="btn-sm btn-wish wishBtn ${wishlist.includes(p.id)?'active':''}" data-id="${p.id}">❤️</button>
                </div>
            </div>`;
        }).join('');
        document.getElementById('productsGrid').innerHTML = html;
        document.querySelectorAll('.addCartBtn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); addToCart(parseInt(btn.dataset.id)); }));
        document.querySelectorAll('.wishBtn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); toggleWish(parseInt(btn.dataset.id)); }));
        document.querySelectorAll('.product-card').forEach(card => card.addEventListener('click', () => openProduct(parseInt(card.dataset.id))));
        updateWishUI();
    }

    function openProduct(id) { 
        let p = products.find(x=>x.id===id); 
        if(!p) return; 
        currentProduct = p; 
        let seller = sellers.find(s=>s.id===p.sellerId) || {shopName:p.sellerName || "GlobalBazaar", country:"SA"}; 
        let final = calcFinalPrice(p.price, seller.country || "SA"); 
        document.getElementById('modalImg').src = p.image; 
        document.getElementById('modalTitle').innerText = p.name; 
        document.getElementById('modalSellerName').innerHTML = `🏪 ${seller.shopName || "GlobalBazaar"}`; 
        document.getElementById('modalDesc').innerText = p.description; 
        document.getElementById('modalPrice').innerHTML = `${getSym()}${convert(final.total)}`; 
        let stars = "★".repeat(Math.floor(p.rating)) + "☆".repeat(5-Math.floor(p.rating)); 
        document.getElementById('modalStars').innerHTML = stars; 
        document.getElementById('modalReviews').innerHTML = p.reviews.map(r=>`<div class="order-card">⭐${r.rating} - ${r.text}<br><small>${r.user}</small></div>`).join('') || "<i>No reviews</i>"; 
        document.getElementById('productModal').style.display = 'block'; 
    }
    let currentProduct = null;

    function addToCart(id) { 
        let p = products.find(x=>x.id===id); 
        if(!p) return; 
        let existing = cart.find(i=>i.id===id); 
        if(existing) existing.qty++; 
        else cart.push({id:p.id, name:p.name, price:p.price, sellerId:p.sellerId, sellerName:p.sellerName, qty:1}); 
        saveAll(); 
        updateCartUI(); 
        alert("✅ Added to cart"); 
    }
    function updateCartUI() { 
        let c = cart.reduce((a,b)=>a+b.qty,0); 
        document.getElementById('cartCountBadge').innerText = c; 
    }
    function toggleWish(id) { 
        if(wishlist.includes(id)) wishlist = wishlist.filter(i=>i!==id); 
        else wishlist.push(id); 
        saveAll(); 
        renderProducts(); 
        updateWishUI(); 
    }
    function updateWishUI() { 
        document.getElementById('wishCountHead').innerText = wishlist.length; 
    }

    // ADDRESS COLLECTION (LINE BY LINE)
    function collectAddress() {
        let address = {
            fullName: prompt("📝 1/7 - Full Name (Required):", ""),
            street: prompt("📝 2/7 - Street / Area / Village (Required):", ""),
            houseNo: prompt("📝 3/7 - House / Building No. (Optional):", "") || "N/A",
            landmark: prompt("📝 4/7 - Landmark (Optional):", "") || "N/A",
            city: prompt("📝 5/7 - City / Town (Required):", ""),
            state: prompt("📝 6/7 - State / Province (Required):", ""),
            country: prompt("📝 7/7 - Country (Required):", "India")
        };
        if(!address.fullName || !address.street || !address.city || !address.state || !address.country) {
            alert("❌ Full Name, Street, City, State, Country are required!");
            return null;
        }
        return address;
    }

    // CHECKOUT
    document.getElementById('cartFloatBtn')?.addEventListener('click', () => {
        if(cart.length===0) return alert("Cart is empty!");
        if(!currentBuyer) { alert("Please login as buyer first!"); switchMode('profile'); return; }
        
        let address = collectAddress();
        if(!address) return;
        
        let totalUSD = cart.reduce((a,i)=>a+(i.price*i.qty),0);
        let trackingGen = "GB" + Date.now() + Math.floor(Math.random()*1000);
        
        cart.forEach(item => {
            let seller = sellers.find(s=>s.id===item.sellerId);
            orders.push({ 
                id: Date.now()+Math.random(), 
                trackingNumber: trackingGen,
                sellerId: item.sellerId, 
                sellerName: item.sellerName, 
                buyerEmail: currentBuyer.email, 
                buyerName: address.fullName,
                productName: item.name, 
                amount: item.price*item.qty,
                address: `${address.fullName}, ${address.street}, ${address.houseNo}, ${address.landmark}, ${address.city}, ${address.state}, ${address.country}`,
                date: new Date().toISOString(), 
                status: "confirmed"
            });
            if(seller) seller.earnings += (item.price*item.qty);
        });
        cart = []; 
        saveAll(); 
        updateCartUI(); 
        alert(`✅ ORDER CONFIRMED!\n\nTracking Number: ${trackingGen}\n\nYour order will be shipped soon.`);
        if(currentBuyer) renderBuyerOrders();
    });

    // SELLER REGISTRATION
    document.getElementById('sellerRegForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        let avatar = document.getElementById('sellerAvatar').files[0];
        let idImg = document.getElementById('sellerIdImage').files[0];
        if(!avatar || !idImg) { alert("Upload profile photo & ID document"); return; }
        let reader = new FileReader();
        reader.onload = (ev) => {
            let avatarUrl = ev.target.result;
            let reader2 = new FileReader();
            reader2.onload = (ev2) => {
                let newSeller = { 
                    id: Date.now(), avatar: avatarUrl, 
                    fullName: document.getElementById('sellerFullName').value,
                    shopName: document.getElementById('sellerShopName').value,
                    email: document.getElementById('sellerEmail').value,
                    phone: document.getElementById('sellerPhone').value,
                    password: document.getElementById('sellerPassword').value,
                    street: document.getElementById('sellerStreet').value,
                    city: document.getElementById('sellerCity').value,
                    state: document.getElementById('sellerState').value,
                    country: document.getElementById('sellerCountryReg').value,
                    idType: document.getElementById('sellerIdType').value,
                    idNumber: document.getElementById('sellerIdNumber').value,
                    idDoc: ev2.target.result,
                    bankName: document.getElementById('sellerBank').value,
                    iban: document.getElementById('sellerIban').value,
                    swift: document.getElementById('sellerSwift').value,
                    earnings: 0, products: []
                };
                sellers.push(newSeller); 
                currentSeller = newSeller; 
                saveAll();
                document.getElementById('sellerRegisterBox').style.display = 'none'; 
                document.getElementById('sellerDashboard').style.display = 'block';
                renderSellerDashboard();
                alert("✅ Shop Registered Successfully!");
            };
            reader2.readAsDataURL(idImg);
        };
        reader.readAsDataURL(avatar);
    });

    function renderSellerDashboard() {
        if(!currentSeller) return;
        let prodList = products.filter(p=>p.sellerId===currentSeller.id);
        let sellerOrders = orders.filter(o=>o.sellerId===currentSeller.id);
        let totalEarn = sellerOrders.reduce((a,b)=>a+b.amount,0);
        currentSeller.earnings = totalEarn; 
        saveAll();
        document.getElementById('sellerDashboard').innerHTML = `
            <div class="modal-card">
                <div class="flex-between">
                    <div><img src="${currentSeller.avatar}" style="width:70px;height:70px;border-radius:50%;"><h2>${currentSeller.shopName}</h2><p>${currentSeller.fullName}</p><p>📞 ${currentSeller.phone}</p></div>
                    <span style="background:#dcfce7;padding:6px 14px;border-radius:30px;">✅ KYC</span>
                </div>
                <div class="flex-between" style="margin:16px 0;"><span>🏦 ${currentSeller.bankName}</span><span>💰 ${getSym()}${convert(totalEarn)}</span></div>
                <button id="withdrawBtnSeller" class="btn-primary" style="margin-top:12px;">💸 Withdraw Weekly</button>
            </div>
            <div class="modal-card">
                <h3>➕ Add Product</h3>
                <div id="illegalWarning" class="illegal-warning" style="display:none;">🚫 ILLEGAL PRODUCT DETECTED! This product violates our policy.</div>
                <input id="prodName" class="input" placeholder="Product Name">
                <input id="prodPriceUsd" class="input" type="number" placeholder="Selling Price USD">
                <input id="prodCost" class="input" type="number" placeholder="My cost USD">
                <input id="prodShipCost" class="input" type="number" placeholder="Shipping cost I pay">
                <select id="prodCat" class="input"><option>Electronics</option><option>Fashion</option><option>Home</option><option>Beauty</option></select>
                <input id="prodImgUrl" class="input" placeholder="Image URL">
                <textarea id="prodDescArea" class="input" rows="3" placeholder="Description"></textarea>
                <button id="publishProdBtn" class="btn-primary">Publish Product</button>
            </div>
            <div class="modal-card"><h3>📋 My Products</h3><div id="sellerProdList"></div></div>
            <div class="modal-card"><h3>📦 Orders Received</h3><div id="sellerOrdersList"></div></div>`;
        
        document.getElementById('publishProdBtn')?.addEventListener('click', () => {
            let name = document.getElementById('prodName').value;
            let desc = document.getElementById('prodDescArea').value;
            let illegalCheck = isProductIllegal(name, desc);
            if(illegalCheck.illegal) {
                document.getElementById('illegalWarning').style.display = 'block';
                alert(`🚫 BLOCKED! Product contains illegal keyword: "${illegalCheck.keyword}"\n\nWeapons, Drugs, Human Trafficking, and Counterfeit products are strictly prohibited.`);
                return;
            }
            document.getElementById('illegalWarning').style.display = 'none';
            let price = parseFloat(document.getElementById('prodPriceUsd').value);
            let cost = parseFloat(document.getElementById('prodCost').value);
            let shipCost = parseFloat(document.getElementById('prodShipCost').value);
            let cat = document.getElementById('prodCat').value;
            let img = document.getElementById('prodImgUrl').value;
            if(!name || !price) { alert("Fill product name and price"); return; }
            let newP = { 
                id: Date.now(), 
                sellerId: currentSeller.id, 
                sellerName: currentSeller.shopName, 
                name, price, category: cat, 
                image: img || "https://placehold.co/200x200", 
                description: desc, rating:0, reviews:[], 
                costPrice: cost, shippingCostSeller: shipCost, weight: 0.5 
            };
            products.push(newP); 
            saveAll(); 
            renderSellerDashboard(); 
            renderProducts();
            alert("✅ Product published successfully!");
            document.getElementById('prodName').value = '';
            document.getElementById('prodPriceUsd').value = '';
            document.getElementById('prodCost').value = '';
            document.getElementById('prodShipCost').value = '';
            document.getElementById('prodImgUrl').value = '';
            document.getElementById('prodDescArea').value = '';
        });
        
        document.getElementById('sellerProdList').innerHTML = prodList.map(p=>`<div class="flex-between"><span>${p.name} - ${getSym()}${convert(p.price)}</span><button class="delProd" data-id="${p.id}" style="background:#dc2626;border:none;padding:8px 16px;border-radius:30px;color:white;">❌</button></div>`).join('');
        document.querySelectorAll('.delProd').forEach(btn => btn.addEventListener('click', (e) => { let id = parseInt(btn.dataset.id); products = products.filter(p=>p.id!==id); saveAll(); renderSellerDashboard(); renderProducts(); }));
        
        document.getElementById('sellerOrdersList').innerHTML = sellerOrders.map(o=>`<div class="order-card"><strong>Order #${o.trackingNumber}</strong><br>Buyer: ${o.buyerName}<br>Product: ${o.productName}<br>Amount: ${getSym()}${convert(o.amount)}<br>Address: ${o.address}<br><button class="markShippedBtn" data-order="${o.id}" style="background:#2563eb;border:none;padding:8px 16px;border-radius:30px;color:white;">📦 Mark Shipped</button></div>`).join('');
        document.querySelectorAll('.markShippedBtn').forEach(btn => btn.addEventListener('click', (e) => { let oid = btn.dataset.order; let track = prompt("Enter Tracking Number:"); if(track) { let ord = orders.find(o=>o.id==oid); if(ord) ord.trackingNumber = track; saveAll(); alert("Tracking added!"); renderSellerDashboard(); } }));
        
        document.getElementById('withdrawBtnSeller')?.addEventListener('click', () => { if(currentSeller.earnings>0) { payouts.push({sellerId:currentSeller.id, amount:currentSeller.earnings, date:new Date().toISOString()}); currentSeller.earnings=0; saveAll(); alert("Withdrawal requested! Weekly payout."); renderSellerDashboard(); } else alert("No balance"); });
    }

    // BUYER AUTH
    document.getElementById('showLoginBtn')?.addEventListener('click', () => { document.getElementById('loginFormDiv').style.display='block'; document.getElementById('signupFormDiv').style.display='none'; });
    document.getElementById('showSignupBtn')?.addEventListener('click', () => { document.getElementById('loginFormDiv').style.display='none'; document.getElementById('signupFormDiv').style.display='block'; });
    document.getElementById('doLoginBtn')?.addEventListener('click', () => { let em = document.getElementById('loginEmail').value, pw = document.getElementById('loginPass').value; let b = buyers.find(x=>x.email===em && x.password===pw); if(b) { currentBuyer = b; saveAll(); document.getElementById('profileAuthBox').style.display='none'; document.getElementById('buyerProfilePanel').style.display='block'; document.getElementById('profileName').innerText = b.name; renderBuyerOrders(); alert("Welcome!"); } else alert("Invalid"); });
    document.getElementById('doSignupBtn')?.addEventListener('click', () => { let name = document.getElementById('signupName').value, em = document.getElementById('signupEmail').value, pw = document.getElementById('signupPass').value; if(buyers.find(x=>x.email===em)) return alert("Email exists"); buyers.push({name, email:em, password:pw}); currentBuyer = {name, email:em, password:pw}; saveAll(); document.getElementById('profileAuthBox').style.display='none'; document.getElementById('buyerProfilePanel').style.display='block'; document.getElementById('profileName').innerText = name; renderBuyerOrders(); alert("Signup success!"); });
    document.getElementById('logoutBuyerBtn')?.addEventListener('click', () => { currentBuyer = null; saveAll(); document.getElementById('profileAuthBox').style.display='block'; document.getElementById('buyerProfilePanel').style.display='none'; });
    
    function renderBuyerOrders() { 
        let myOrders = orders.filter(o=>o.buyerEmail===currentBuyer?.email); 
        document.getElementById('buyerOrdersList').innerHTML = myOrders.map(o=>`<div class="order-card"><strong>🔖 Tracking: ${o.trackingNumber}</strong><br>${o.productName} - ${getSym()}${convert(o.amount)}<br>📍 ${o.address}<br>Status: ${o.status}<br><button class="trackBtn" data-track="${o.trackingNumber}" style="background:#2563eb;border:none;padding:8px 16px;border-radius:30px;color:white;">🔍 Track Order</button></div>`).join('');
        document.querySelectorAll('.trackBtn').forEach(btn => btn.addEventListener('click', () => { alert(`Tracking Number: ${btn.dataset.track}\nUse courier website to track`); }));
    }

    // DRAWER & TABS
    function openDrawer() { document.getElementById('drawer').classList.add('open'); document.getElementById('drawerOverlay').style.display = 'block'; }
    function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').style.display = 'none'; }
    document.getElementById('menuBtn').onclick = openDrawer;
    document.getElementById('drawerOverlay').onclick = closeDrawer;
    
    function switchMode(mode) {
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
        if(mode==='buyer') { document.querySelector('.mode-btn[data-tab="buyer"]').classList.add('active'); document.getElementById('buyerSection').classList.add('active'); }
        else if(mode==='seller') { document.querySelector('.mode-btn[data-tab="seller"]').classList.add('active'); document.getElementById('sellerSection').classList.add('active'); if(currentSeller) { document.getElementById('sellerRegisterBox').style.display='none'; document.getElementById('sellerDashboard').style.display='block'; renderSellerDashboard(); } }
        else if(mode==='profile') { document.querySelector('.mode-btn[data-tab="profile"]').classList.add('active'); document.getElementById('profileSection').classList.add('active'); if(currentBuyer) { document.getElementById('profileAuthBox').style.display='none'; document.getElementById('buyerProfilePanel').style.display='block'; renderBuyerOrders(); } }
        closeDrawer();
    }
    
    document.querySelectorAll('.mode-btn').forEach(btn => btn.addEventListener('click', (e) => { let tab = btn.dataset.tab; switchMode(tab); }));
    document.querySelectorAll('.drawer-item[data-mode]').forEach(el => el.addEventListener('click', (e) => { switchMode(el.dataset.mode); }));
    document.getElementById('drawerWishlist')?.addEventListener('click', () => { let wishProds = products.filter(p=>wishlist.includes(p.id)); alert("❤️ Wishlist:\n"+wishProds.map(p=>p.name).join("\n")); closeDrawer(); });
    document.getElementById('drawerLogout')?.addEventListener('click', () => { currentBuyer=null; currentSeller=null; saveAll(); location.reload(); });
    document.getElementById('closeModalBtn')?.addEventListener('click', () => document.getElementById('productModal').style.display='none');
    document.getElementById('modalAddCartBtn')?.addEventListener('click', () => { if(currentProduct) addToCart(currentProduct.id); document.getElementById('productModal').style.display='none'; });
    document.getElementById('modalAddWishBtn')?.addEventListener('click', () => { if(currentProduct) toggleWish(currentProduct.id); document.getElementById('productModal').style.display='none'; });
    document.getElementById('submitReviewBtn')?.addEventListener('click', () => { if(!currentBuyer) return alert("Login to review"); let rate = parseInt(document.getElementById('ratingSelect').value); let txt = document.getElementById('reviewText').value; if(!txt) return; currentProduct.reviews.push({user: currentBuyer.name, rating: rate, text: txt}); let avg = currentProduct.reviews.reduce((a,b)=>a+b.rating,0)/currentProduct.reviews.length; currentProduct.rating = avg; saveAll(); openProduct(currentProduct.id); document.getElementById('reviewText').value=''; renderProducts(); });

    renderCats(); renderProducts(); updateCartUI(); updateWishUI();
    if(currentSeller) { document.getElementById('sellerRegisterBox').style.display='none'; document.getElementById('sellerDashboard').style.display='block'; renderSellerDashboard(); }
    if(currentBuyer) { document.getElementById('profileAuthBox').style.display='none'; document.getElementById('buyerProfilePanel').style.display='block'; document.getElementById('profileName').innerText = currentBuyer.name; renderBuyerOrders(); }
</script>
</body>
</html>
