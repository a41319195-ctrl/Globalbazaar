<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalBazaar | Professional Node Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e3a8a; --accent: #2563eb; --bg: #f8fafc; --text: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 50px; }

        /* Header Layout */
        header { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 800; color: var(--primary); font-size: 20px; }
        .header-controls { display: flex; align-items: center; gap: 15px; }
        
        /* Node & Currency */
        .node-box { background: #eff6ff; padding: 6px 12px; border-radius: 8px; border: 1px solid #bfdbfe; font-size: 13px; font-weight: 600; }
        .node-box select { border: none; background: transparent; color: var(--primary); cursor: pointer; font-weight: 700; }

        /* Main Container */
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        /* Mode Switcher */
        .mode-switcher { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #e2e8f0; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .mode-btn.active { background: var(--primary); color: white; }

        .app-section { display: none; }
        .active-section { display: block; }

        /* General UI Elements */
        .card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .app-input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 10px; }
        .app-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { background: white; padding: 10px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="logo">GlobalBazaar 🌍</div>
        <div class="header-controls">
            <div class="node-box">
                Node: <select id="currencySelect" onchange="updateCurrency()">
                    <option value="SAR">SAR (Saudi)</option>
                    <option value="USD">USD ($)</option>
                    <option value="EUR">EUR (€)</option>
                </select>
            </div>
            <div id="cartCount">🛒 0</div>
        </div>
    </header>

    <div class="container">
        <div class="mode-switcher">
            <button class="mode-btn active" onclick="switchTab(this, 'buyer')">🛒 Buyer</button>
            <button class="mode-btn" onclick="switchTab(this, 'seller')">🏪 Seller</button>
        </div>

        <div id="buyer" class="app-section active-section">
            <input type="text" class="app-input" placeholder="Search products...">
            <div class="market-grid" id="productGrid">
                </div>
        </div>

        <div id="seller" class="app-section">
            <div class="card">
                <h2>Merchant Dashboard</h2>
                <input type="text" class="app-input" placeholder="Shop Name">
                <input type="text" class="app-input" placeholder="Bank IBAN">
                <button class="app-btn">Verify Account</button>
            </div>
        </div>
    </div>

    <script>
        function switchTab(btn, tabId) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.app-section').forEach(s => s.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
        }

        function updateCurrency() {
            const currency = document.getElementById('currencySelect').value;
            console.log("Currency changed to:", currency);
            // यहाँ हम करेंसी कन्वर्जन का लॉजिक डालेंगे
        }
    </script>
</body>
</html>
